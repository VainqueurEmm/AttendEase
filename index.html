function slotStatus(tt) {
  const now=new Date(), dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][now.getDay()];
  if(tt.day!==dow||tt.cancelled) return {live:false,status:tt.cancelled?"cancelled":"other"};
  const [h,m]=tt.startTime.split(":").map(Number);
  const start=new Date(now); start.setHours(h,m,0,0);
  const end=new Date(start.getTime()+UNIT_DURATION*3600000);
  const diff=(now-start)/60000;
  if(diff<-5) return {live:false,status:"upcoming",minsUntil:Math.ceil(-diff)};
  if(now>end) return {live:false,status:"ended"};
  return {live:true,late:diff>LATE_MINS,minsIn:Math.floor(diff),status:"live"};
}

function genHistory(units, classes, timetable) {
  const recs=[], lecRecs=[];
  const start=new Date("2025-01-20"), end=new Date("2025-03-01");
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
    if(dow==="Sun"||dow==="Sat") continue;
    const ds=d.toISOString().slice(0,10);
    timetable.forEach(tt=>{
      if(tt.day!==dow||tt.cancelled) return;
      const unit=units.find(u=>u.id===tt.unitId);
      const cls=classes.find(c=>c.id===tt.classId);
      if(!unit||!cls) return;
      const lecPresent=Math.random()<0.91;
      if(lecPresent) lecRecs.push({id:uid(),lecturerId:unit.lecturerId,ttId:tt.id,unitId:tt.unitId,classId:tt.classId,date:ds,time:new Date(d).toISOString()});
      if(lecPresent) cls.students.forEach(sId=>{
        if(Math.random()<0.82){
          const late=Math.random()<0.11;
          recs.push({id:uid(),studentId:sId,ttId:tt.id,unitId:tt.unitId,classId:tt.classId,date:ds,time:new Date(d).toISOString(),status:late?"late":"present",penalty:0,penaltyNote:"",synced:true});
        }
      });
    });
  }
  return {recs,lecRecs};
}

  return {ok:true,role:c.role,id:c.id,token:"mock_"+uid(),username:u.trim()};
}

function App(){
  const qrReady=useScript("https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js","QRCode");

  const [session,    setSession]    = useState(()=>loadSession());
  const [classes,    setClasses]    = useState(INIT_CLASSES);
  const [students,   setStudents]   = useState(INIT_STUDENTS);
  const [units,      setUnits]      = useState(INIT_UNITS);
  const [timetable,  setTimetable]  = useState(INIT_TT);
  const [notifs,     setNotifs]     = useState([]);
  const [reminders,  setReminders]  = useState([]);
  const [semLocked,  setSemLocked]  = useState(false);
  const histRef = useRef(false);

  const [records,    setRecords]    = useState([]);
  const [lecRecs,    setLecRecs]    = useState([]);

  useEffect(()=>{
    if(histRef.current) return; histRef.current=true;
    const {recs,lecRecs}=genHistory(INIT_UNITS,INIT_CLASSES,INIT_TT);
    setRecords(recs); setLecRecs(lecRecs);
  },[]);

  // ── Online/offline sync ─────────────────────────────────────────────────
  useEffect(()=>{
    const run=()=>{
      const q=loadSyncQ(); if(!q.length) return;
      setRecords(prev=>{
        const ids=new Set(prev.map(r=>r.id));
        return [...prev,...q.filter(r=>!ids.has(r.id)).map(r=>({...r,synced:true}))];
      });
      clearSyncQ();
    };
    window.addEventListener("online",run);
    run();
    return()=>window.removeEventListener("online",run);
  },[]);

  // ── Midnight Moodle sync simulation ────────────────────────────────────
  useEffect(()=>{
    const doSync=()=>{
      if(!navigator.onLine){ pushSyncQ({type:"moodle_sync",at:nowISO()}); return; }
      setStudents(prev=>{
        const updated={...prev};
        Object.keys(updated).forEach(id=>{
          // In production: call moodle API — here we leave status as-is
          updated[id]={...updated[id],lastMoodleSync:todayStr()};
        });
        return updated;
      });
      writeAudit("SYSTEM","Moodle sync","Nightly student registration sync completed");
    };
    const now=new Date();
    const midnight=new Date(now); midnight.setHours(24,0,0,0);
    const msUntil=midnight-now;
    const t=setTimeout(()=>{ doSync(); setInterval(doSync,86400000); },msUntil);
    return()=>clearTimeout(t);
  },[]);

  const pushNotif=useCallback((toIds,title,body,type="info")=>{
    setNotifs(prev=>[{id:uid(),toIds,title,body,type,time:nowISO()},...prev]);
  },[]);

  const addReminder=useCallback((ttId,mins)=>{
    setReminders(prev=>{
      if(prev.find(r=>r.ttId===ttId&&r.userId===session?.id)) return prev;
      return [...prev,{id:uid(),ttId,userId:session?.id,mins}];
    });
    if(Notification.permission==="default") Notification.requestPermission();
  },[session]);

  const removeReminder=useCallback(ttId=>{
    setReminders(prev=>prev.filter(r=>!(r.ttId===ttId&&r.userId===session?.id)));
  },[session]);

  // Reminder check every 30s
  useEffect(()=>{
    if(!session) return;
    const check=()=>{
      const now=new Date(), dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][now.getDay()];
      timetable.forEach(tt=>{
        if(tt.day!==dow||tt.cancelled) return;
        reminders.filter(r=>r.ttId===tt.id&&r.userId===session.id).forEach(r=>{
          const [h,m]=tt.startTime.split(":").map(Number);
          const start=new Date(now); start.setHours(h,m,0,0);
          const diff=(start-now)/60000;
          const key=`rem_${r.id}_${todayStr()}`;
          if(Math.abs(diff-r.mins)<0.6&&!sessionStorage.getItem(key)){
            sessionStorage.setItem(key,"1");
            const unit=units.find(u=>u.id===tt.unitId);
            if(Notification.permission==="granted") new Notification(`⏰ Class in ${r.mins} min`,{body:`${unit?.name} — ${tt.room}`});
            pushNotif([session.id],"⏰ Class Reminder",`${unit?.name} starts in ${r.mins} min — ${tt.room}`,"reminder");
          }
        });
      });
    };
    const iv=setInterval(check,30000);
    return()=>clearInterval(iv);
  },[session,timetable,reminders,units,pushNotif]);

  const login=useCallback(async(u,p)=>{
    const res=await mockMoodleLogin(u,p);
    if(!res.ok) return {ok:false};
    const sess={role:res.role,id:res.id,username:res.username,token:res.token,deviceId:getDeviceId()};
    saveSession(sess); setSession(sess);
    writeAudit(res.id,"Login",`Signed in as ${res.role} from device ${getDeviceId()}`);
    return {ok:true};
  },[]);

  const logout=useCallback(()=>{ writeAudit(session?.id||"?","Logout","Session ended"); clearSession(); setSession(null); },[session]);

  const shared={session,logout,classes,setClasses,students,setStudents,units,setUnits,timetable,setTimetable,notifs,records,setRecords,lecRecs,setLecRecs,reminders,addReminder,removeReminder,pushNotif,qrReady,semLocked,setSemLocked,writeAudit};

  if(!session) return <><style>{CSS}</style><LoginPage login={login}/></>;

  return(
    <>
      <style>{CSS}</style>
      {session.role==="student"  && <StudentApp  {...shared}/>}
      {session.role==="lecturer" && <LecturerApp {...shared}/>}
      {session.role==="admin"    && <AdminApp    {...shared}/>}
    </>
  );
}

function useScript(src,key){
  const[ready,setReady]=useState(false);
  useEffect(()=>{
    if(window[key]){setReady(true);return;}
    const s=document.createElement("script");s.src=src;s.onload=()=>setReady(true);document.head.appendChild(s);
  },[]);
  return ready;
}

// ─── Student: Scan QR ────────────────────────────────────────────────────────
function StudentScan({session,units,classes,timetable,records,setRecords,students,pushNotif,qrReady}){
  const student=INIT_STUDENTS[session.id]||students[session.id];
  const cls=INIT_CLASSES.find(c=>c.id===student?.classId);
  // Find live or upcoming classes for this student
  const myUnitIds=new Set(units.filter(u=>u.active&&u.classIds.includes(student?.classId||"")).map(u=>u.id));
  const mySlots=timetable.filter(t=>myUnitIds.has(t.unitId)&&t.classId===student?.classId);
  const liveSlots=mySlots.map(t=>({...t,_status:slotStatus(t)})).filter(t=>t._status.live);
  const upcomingSlots=mySlots.map(t=>({...t,_status:slotStatus(t)})).filter(t=>t._status.status==="upcoming").sort((a,b)=>a._status.minsUntil-b._status.minsUntil);

  const[scanning,setScanning]=useState(false);
  const[result,setResult]=useState(null);
  const[checkingStatus,setCheckingStatus]=useState(false);
  const[statusResult,setStatusResult]=useState(null);
  const videoRef=useRef(null); const canvasRef=useRef(null); const animRef=useRef(null);

  const doCheckIn=async(ttId,isLate)=>{
    const tt=timetable.find(t=>t.id===ttId);
    if(!tt) return {ok:false,reason:"not_found"};
    const unit=units.find(u=>u.id===tt.unitId);
    // Check session open (lecturer must have scanned)
    const sessionOpen=window.__openSessions?.[ttId];
    if(!sessionOpen) return {ok:false,reason:"not_open"};
    // One scan per session lock
    const already=records.find(r=>r.studentId===session.id&&r.ttId===ttId&&r.date===todayStr());
    if(already) return {ok:false,reason:"already",status:already.status};
    const rec={id:uid(),studentId:session.id,ttId,unitId:tt.unitId,classId:tt.classId,date:todayStr(),time:nowISO(),status:isLate?"late":"present",penalty:0,penaltyNote:"",synced:navigator.onLine};
    if(!navigator.onLine) pushQueue(rec);
    setRecords(prev=>[...prev,rec]);
    // At-risk check
    const allRecs=[...records,rec];
    const unitRecs=allRecs.filter(r=>r.studentId===session.id&&r.unitId===tt.unitId);
    const totalSlots=timetable.filter(t=>t.unitId===tt.unitId&&t.classId===tt.classId&&!t.cancelled).length;
    const attended=unitRecs.filter(r=>r.status==="present"||r.status==="late").length;
    const pct=totalSlots>0?Math.round(attended/totalSlots*100):100;
    WARN_AT.forEach(w=>{
      const key=`warned_${session.id}_${tt.unitId}_${w}`;
      if(pct<=w&&!sessionStorage.getItem(key)){
        sessionStorage.setItem(key,"1");
        pushNotif([session.id,`HOD_${cls?.hodId||"H01"}`],`⚠ Attendance Warning`,`Your attendance in ${unit?.name} has dropped to ${pct}% — minimum recommended is 75%.`,"warning");
      }
    });
    writeAudit(session.id,"Check-in",`Marked ${isLate?"late":"present"} for ${unit?.name} on ${todayStr()}`);
    return {ok:true,status:rec.status,unit,pct,bonus:bonusMark(pct),standing:standing(pct)};
  };

  const startScan=()=>{
    setScanning(true); setResult(null);
    setTimeout(()=>{
      if(!videoRef.current) return;
      navigator.mediaDevices?.getUserMedia({video:{facingMode:"environment"}}).then(stream=>{
        videoRef.current.srcObject=stream;
        videoRef.current.play();
        tick();
      }).catch(()=>{ setScanning(false); alert("Camera access denied. Please allow camera and retry."); });
    },200);
  };

  const stopScan=(stream)=>{
    if(animRef.current) cancelAnimationFrame(animRef.current);
    if(videoRef.current?.srcObject) videoRef.current.srcObject.getTracks().forEach(t=>t.stop());
    setScanning(false);
  };

  const tick=()=>{
    if(!videoRef.current||!canvasRef.current) return;
    const v=videoRef.current,c=canvasRef.current,ctx=c.getContext("2d");
    if(v.readyState===v.HAVE_ENOUGH_DATA){
      c.width=v.videoWidth; c.height=v.videoHeight;
      ctx.drawImage(v,0,0);
      const img=ctx.getImageData(0,0,c.width,c.height);
      if(window.jsQR){
        const code=window.jsQR(img.data,img.width,img.height);
        if(code?.data?.startsWith("ATTENDEASE:COURSE:")){
          const ttId=code.data.slice(18);
          stopScan();
          const tt=timetable.find(t=>t.id===ttId);
          if(!tt){setResult({ok:false,reason:"invalid_qr"});return;}
          const st=slotStatus(tt);
          if(!st.live){setResult({ok:false,reason:"class_closed",detail:st});return;}
          doCheckIn(ttId,st.late).then(r=>setResult(r));
          return;
        }
      }
    }
    animRef.current=requestAnimationFrame(tick);
  };

  // Demo: simulate scanning without camera
  const demoScan=(ttId)=>{
    const tt=timetable.find(t=>t.id===ttId);
    if(!tt) return;
    const st=slotStatus(tt);
    if(!st.live){
      // For demo, force-open the session and fake live status
      window.__openSessions=window.__openSessions||{};
      window.__openSessions[ttId]=true;
      doCheckIn(ttId,false).then(r=>setResult(r));
      return;
    }
    doCheckIn(ttId,st.late).then(r=>setResult(r));
  };

  const checkStatus=(ttId)=>{
    setCheckingStatus(true);
    const rec=records.find(r=>r.studentId===session.id&&r.ttId===ttId&&r.date===todayStr());
    setTimeout(()=>{ setCheckingStatus(false); setStatusResult(rec||null); },600);
  };

  if(result) return <ScanResult result={result} student={student} onBack={()=>setResult(null)}/>;

  return(
    <div className="slide-in">
      <div style={{marginBottom:18}}>
        <h2 style={{fontWeight:800,fontSize:20}}>Scan QR Attendance</h2>
        <p style={{fontSize:13,color:"#64748b",marginTop:3}}>{cls?.code} · {student?.name}</p>
      </div>

      {/* Live classes */}
      {liveSlots.length>0&&(
        <div style={{marginBottom:16}}>
          {liveSlots.map(tt=>{
            const unit=units.find(u=>u.id===tt.unitId);
            const alreadyIn=records.find(r=>r.studentId===session.id&&r.ttId===tt.id&&r.date===todayStr());
            return(
              <div key={tt.id} className="card" style={{borderLeft:"4px solid #DC2626",marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <span className="live-dot"/><span style={{fontSize:12,fontWeight:700,color:"#DC2626"}}>LIVE NOW</span>
                      {tt._status.late&&<span className="badge" style={{background:"#FEF3C7",color:"#92400E"}}>⚠ {tt._status.minsIn} min in — Late if scanning now</span>}
                    </div>
                    <div style={{fontWeight:700,fontSize:16}}>{unit?.name}</div>
                    <div style={{fontSize:12,color:"#64748b"}}>{unit?.code} · {tt.room} · until {addHrs(tt.startTime,UNIT_DURATION)}</div>
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {alreadyIn

function ScanResult({result,student,onBack}){
  const{ok,reason,status,unit,pct,bonus,standing:std,detail}=result;
  if(!ok){
    const msgs={
      not_open:"The lecturer hasn't opened this session yet. Please wait for your lecturer to scan first.",
      already:`You're already marked as ${result.status} for this class today.`,
      class_closed: detail?.status==="upcoming"?`Class hasn't started yet. Opens in ${detail.minsUntil} min.`:detail?.status==="ended"?"Check-in window has closed for this class.":"This class is not scheduled today.",
      not_found:"Invalid QR code — please use the printed classroom QR.",
      invalid_qr:"QR code not recognised. Make sure you're scanning the classroom QR.",
    };
    return(
      <div className="card pop-in" style={{maxWidth:380,margin:"0 auto",textAlign:"center",padding:36}}>
        <div style={{fontSize:44,marginBottom:10}}>{reason==="already"?"✅":"⛔"}</div>

        <p style={{color:"#64748b",fontSize:13,lineHeight:1.6,marginBottom:18}}>{msgs[reason]||"Something went wrong. Please try again."}</p>
        <button className="btn btn-blue" style={{width:"100%"}} onClick={onBack}>← Back</button>
      </div>
    );

  const isLate=status==="late";
  return(
    <div className="card pop-in" style={{maxWidth:380,margin:"0 auto",textAlign:"center",padding:36}}>
      <div style={{width:64,height:64,borderRadius:"50%",background:isLate?"linear-gradient(135deg,#D97706,#F59E0B)":"linear-gradient(135deg,#059669,#34d399)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:700,color:"#fff",margin:"0 auto 10px"}}>{student?.photo}</div>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:".1em",color:isLate?"#D97706":"#059669",marginBottom:4}}>{isLate?"⚠ LATE ARRIVAL":"✓ ATTENDANCE MARKED"}</div>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:2}}>{student?.name}</h2>
      <div style={{fontSize:13,color:"#64748b",marginBottom:2}}>{student?.adm}</div>
      <div style={{fontSize:13,fontWeight:600,color:"#2563EB",marginBottom:16}}>{unit?.name} · {fmtTime(nowISO())}</div>
      {std&&(
        <div style={{background:`${std.c}0e`,border:`1.5px solid ${std.c}28`,borderRadius:14,padding:14,marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:std.c,letterSpacing:".08em"}}>{std.i} {std.l}</div>
          <div style={{fontSize:30,fontWeight:800,color:"#0F1B35",margin:"4px 0"}}>{pct}<span style={{fontSize:16}}>%</span></div>
          <div style={{fontSize:12,color:"#64748b"}}>Semester attendance</div>
          <div style={{marginTop:8,display:"inline-block",background:"#EEF2FF",borderRadius:8,padding:"5px 14px",fontSize:13,fontWeight:700,color:"#2563EB"}}>+{bonus} bonus marks</div>

  );
}

      {daySlots.length===0?<div className="card" style={{textAlign:"center",padding:36,color:"#94a3b8"}}>No classes scheduled on {selDay}.</div>

              <div>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>

                  {tt.cancelled&&<span className="badge" style={{background:"#FEE2E2",color:"#DC2626"}}>❌ Cancelled</span>}
                  {st.live&&<span className="badge" style={{background:"#FEE2E2",color:"#DC2626",animation:"lpulse 2s infinite"}}>🔴 LIVE</span>}
                  {st.status==="upcoming"&&d===todayDow()&&<span className="badge" style={{background:"#EEF2FF",color:"#2563EB"}}>in {st.minsUntil}m</span>}
                </div>

                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{tt.startTime} – {addHrs(tt.startTime,UNIT_DURATION)} · {tt.room} · {tt.type}</div>
                {todayRec&&<div style={{fontSize:12,color:"#059669",marginTop:3,fontWeight:600}}>✓ {todayRec.status==="late"?"Late":"Present"} at {fmtTime(todayRec.time)}</div>}

          </div>
        </div>
      )}
    </div>
  );
}

// ─── Student: Attendance ─────────────────────────────────────────────────────
function StudentAttendance({session,units,timetable,records,students}){
  const student=INIT_STUDENTS[session.id]||students[session.id];
  const myUnits=units.filter(u=>u.active&&u.classIds.includes(student?.classId||""));
  const[sel,setSel]=useState(null);

  const getStats=(unitId)=>{
    const slots=timetable.filter(t=>t.unitId===unitId&&t.classId===student?.classId&&!t.cancelled);
    const today=new Date(), start=new Date("2025-01-20");
    let totalHeld=0;
    slots.forEach(tt=>{
      for(let d=new Date(start);d<=today;d.setDate(d.getDate()+1)){
        const dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
        if(dow===tt.day) totalHeld++;
      }
    });
    const unitRecs=records.filter(r=>r.studentId===session.id&&r.unitId===unitId);
    const attended=unitRecs.filter(r=>r.status==="present"||r.status==="late").length;
    const lateCount=unitRecs.filter(r=>r.status==="late").length;
    const absences=totalHeld-attended;
    const effectiveLates=Math.floor(lateCount/LATE_POLICY);
    const effectiveAbsences=absences+effectiveLates;
    const pct=totalHeld>0?Math.round(attended/totalHeld*100):0;
    const bonus=bonusMark(pct);
    const penalties=unitRecs.reduce((a,r)=>a+((r.penalty||0)*(r.penaltyForgiven?0:1)),0);
    const net=Math.max(0,bonus-penalties);
    const remaining=slots.filter(tt=>{
      const dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][today.getDay()];
      return true; // simplified
    }).length;
    const projectedPct=totalHeld>0?Math.round((attended+remaining)/Math.max(totalHeld+remaining,1)*100):0;
    return{totalHeld,attended,absent:absences,lateCount,effectiveAbsences,pct,bonus,penalties,net,projectedPct,std:standing(pct)};
  };

  const allStats=myUnits.map(u=>({u,st:getStats(u.id)}));
  const avgPct=allStats.length?Math.round(allStats.reduce((a,x)=>a+x.st.pct,0)/allStats.length):0;
  const totalBonus=allStats.reduce((a,x)=>a+x.st.net,0);

  return(
    <div className="slide-in">
      <h2 style={{fontWeight:800,fontSize:20,marginBottom:16}}>My Attendance</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:18}}>
        {[["Overall",`${avgPct}%`,"#2563EB"],["Net Marks",`+${totalBonus}`,"#059669"],["Units",myUnits.length,"#F59E0B"]].map(([l,v,c])=>(
          <div key={l} className="card" style={{textAlign:"center",borderTop:`3px solid ${c}`}}>
            <div style={{fontSize:26,fontWeight:800,color:c}}>{v}</div>
            <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
      {allStats.map(({u,st})=>(
        <div key={u.id} className="card" style={{marginBottom:12,cursor:"pointer",border:sel===u.id?"2px solid #2563EB":"2px solid transparent"}} onClick={()=>setSel(sel===u.id?null:u.id)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontWeight:700,fontSize:15}}>{u.name}</div><div style={{fontSize:12,color:"#64748b"}}>{u.code}</div></div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:22,fontWeight:800,color:st.pct>=75?"#059669":st.pct>=60?"#F59E0B":"#DC2626"}}>{st.pct}%</div>
              <div style={{fontSize:12,color:"#2563EB",fontWeight:600}}>net +{st.net}</div>
            </div>
          </div>
          {sel===u.id&&(
            <div className="slide-in" style={{marginTop:14}}>
              <div style={{height:6,background:"#EEF2FF",borderRadius:99,overflow:"hidden",marginBottom:12}}>
                <div style={{width:`${st.pct}%`,height:"100%",background:st.pct>=75?"#059669":st.pct>=60?"#F59E0B":"#DC2626",borderRadius:99,transition:"width .6s"}}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
                {[["Attended",st.attended,"#059669"],["Late",st.lateCount,"#D97706"],["Absent",st.absent,"#DC2626"]].map(([l,v,c])=>(
                  <div key={l} className="card-sm" style={{textAlign:"center",padding:"8px 4px"}}>
                    <div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div>
                    <div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
                {[["Bonus",`+${st.bonus}`,"#2563EB"],["Penalty",`-${st.penalties}`,"#DC2626"],["Net",`+${st.net}`,"#059669"]].map(([l,v,c])=>(
                  <div key={l} className="card-sm" style={{textAlign:"center",padding:"8px 4px",background:`${c}08`}}>
                    <div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div>
                    <div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{padding:"9px 14px",borderRadius:10,background:`${st.std.c}0e`,border:`1px solid ${st.std.c}22`,marginBottom:8}}>
                <div style={{fontWeight:600,color:st.std.c,fontSize:13}}>{st.std.i} {st.std.l}</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Projected end-of-semester: <strong>{st.projectedPct}%</strong> (if all remaining classes attended)</div>
              </div>
              <div style={{fontSize:11,color:"#94a3b8"}}>Policy: {LATE_POLICY} lates = 1 absence · Max penalty: -10</div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

      </div>

      {tab==="scan"      && <LecturerScan      {...props} myUnits={myUnits}/>}
      {tab==="register"  && <LecturerRegister  {...props} myUnits={myUnits}/>}
      {tab==="timetable" && <TimetableManager  {...props} myUnits={myUnits} role="lecturer"/>}
      {tab==="units"     && <UnitManager       {...props} myUnits={myUnits} isAdmin={false}/>}
      {tab==="penalties" && <PenaltyManager    {...props} myUnits={myUnits}/>}
      {tab==="qr"        && <LecturerQR        {...props} myUnits={myUnits}/>}
      {tab==="notifs"    && <NotifList notifs={myNotifs}/>}
    </Shell>
  );
}

// ─── Lecturer: Scan to open session ──────────────────────────────────────────
function LecturerScan({session,units,timetable,lecRecs,setLecRecs,pushNotif,myUnits,qrReady}){
  const mySlots=timetable.filter(t=>myUnits.some(u=>u.id===t.unitId)).map(t=>({...t,_status:slotStatus(t)}));
  const liveSlots=mySlots.filter(t=>t._status.live);
  const[opening,setOpening]=useState(null);

  window.__openSessions=window.__openSessions||{};

  const openSession=async(tt)=>{
    setOpening(tt.id);
    await delay(600);
    window.__openSessions[tt.id]=true;
    const already=lecRecs.find(r=>r.lecturerId===session.id&&r.ttId===tt.id&&r.date===todayStr());
    if(!already){
      const rec={id:uid(),lecturerId:session.id,ttId:tt.id,unitId:tt.unitId,classId:tt.classId,date:todayStr(),time:nowISO()};
      setLecRecs(prev=>[...prev,rec]);
      writeAudit(session.id,"Session open",`Opened attendance for ${units.find(u=>u.id===tt.unitId)?.name}`);
    }
    setOpening(null);
  };

  return(
    <div className="slide-in">
      <h2 style={{fontWeight:700,fontSize:18,marginBottom:6}}>Open Attendance Session</h2>
      <p style={{fontSize:13,color:"#64748b",marginBottom:18}}>Scan the class QR (kept by class rep) or tap to open — students cannot check in until you do this.</p>

      {liveSlots.length===0?(
        <div className="card" style={{textAlign:"center",padding:40,color:"#94a3b8"}}>
          <div style={{fontSize:40,marginBottom:10}}>📋</div>
          <div style={{fontWeight:600,marginBottom:4}}>No live classes right now</div>
          <div style={{fontSize:12}}>Check your timetable for scheduled sessions.</div>
        </div>
      ):liveSlots.map(tt=>{
        const unit=units.find(u=>u.id===tt.unitId);
        const isOpen=!!window.__openSessions[tt.id];
        const hasLecRec=lecRecs.find(r=>r.lecturerId===session.id&&r.ttId===tt.id&&r.date===todayStr());
        return(
          <div key={tt.id} className="card" style={{marginBottom:12,borderLeft:"4px solid #059669"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
                  <span className="live-dot"/><span style={{fontSize:12,fontWeight:700,color:"#DC2626"}}>LIVE NOW</span>
                </div>
                <div style={{fontWeight:700,fontSize:16}}>{unit?.name}</div>
                <div style={{fontSize:12,color:"#64748b"}}>{unit?.code} · {tt.room} · {tt.startTime}–{addHrs(tt.startTime,UNIT_DURATION)}</div>
              </div>
              {isOpen||hasLecRec
                ?<span className="badge" style={{background:"#D1FAE5",color:"#065F46",fontSize:13,padding:"10px 16px"}}>✓ Session Open — Students can scan</span>
                :<button className="btn btn-green" onClick={()=>openSession(tt)} disabled={opening===tt.id}>
                  {opening===tt.id?<><Spinner/>Opening…</>:"📷 Scan QR / Open Session"}
                </button>
              }
            </div>
          </div>
        );
      })}

      <div style={{background:"#F0FDF4",borderRadius:12,padding:"12px 16px",marginTop:8,fontSize:13,color:"#065F46",border:"1px solid #BBF7D0"}}>
        💡 <strong>Tip:</strong> The printed class QR is kept by your class representative. Scanning it confirms your attendance and opens check-in for students. If no camera, tap "Open Session" directly.
      </div>
    </div>
  );
}

// ─── Lecturer: Register ───────────────────────────────────────────────────────
function LecturerRegister({session,units,classes,timetable,records,setRecords,myUnits,pushNotif,semLocked,writeAudit}){
  const[selUnit,setSelUnit]=useState(myUnits[0]?.id||"");
  const unit=units.find(u=>u.id===selUnit);
  const unitClasses=classes.filter(c=>unit?.classIds.includes(c.id));
  const[selClass,setSelClass]=useState(unitClasses[0]?.id||"");
  const cls=classes.find(c=>c.id===selClass);
  const enrolled=(cls?.students||[]).map(id=>INIT_STUDENTS[id]).filter(Boolean).filter(s=>s.status!=="deferred");
  const todayRecs=records.filter(r=>r.unitId===selUnit&&r.classId===selClass&&r.date===todayStr());
  const presentIds=new Set(todayRecs.map(r=>r.studentId));

  const mark=(studentId,status)=>{
    if(semLocked) return;
    if(records.find(r=>r.studentId===studentId&&r.unitId===selUnit&&r.classId===selClass&&r.date===todayStr())) return;
    const rec={id:uid(),studentId,ttId:"MANUAL",unitId:selUnit,classId:selClass,date:todayStr(),time:nowISO(),status,penalty:0,penaltyNote:"",synced:true};
    setRecords(prev=>[...prev,rec]);
    writeAudit(session.id,"Manual mark",`Marked ${INIT_STUDENTS[studentId]?.name} as ${status} in ${unit?.code}`);
  };

  const getStats=(studentId)=>{
    const allSlots=timetable.filter(t=>t.unitId===selUnit&&t.classId===selClass&&!t.cancelled);
    const today=new Date(),start=new Date("2025-01-20");
    let total=0;
    allSlots.forEach(tt=>{
      for(let d=new Date(start);d<=today;d.setDate(d.getDate()+1)){
        if(["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()]===tt.day) total++;
      }
    });
    const recs=records.filter(r=>r.studentId===studentId&&r.unitId===selUnit);
    const attended=recs.filter(r=>r.status==="present"||r.status==="late").length;
    const lateCount=recs.filter(r=>r.status==="late").length;
    const pct=total>0?Math.round(attended/total*100):0;
    return{total,attended,absent:total-attended,lateCount,pct,bonus:bonusMark(pct),std:standing(pct)};
  };

  const exportCSV=()=>{
    const rows=[["Name","Adm No","Attended","Late","Absent","Total","Rate%","Bonus","Penalty","Net","Standing","Note"]];
    enrolled.forEach(s=>{
      const st=getStats(s.id);
      const penalty=records.filter(r=>r.studentId===s.id&&r.unitId===selUnit).reduce((a,r)=>a+((r.penalty||0)*(r.penaltyForgiven?0:1)),0);
      const net=Math.max(0,st.bonus-penalty);
      rows.push([s.name,s.adm,st.attended,st.lateCount,st.absent,st.total,st.pct,st.bonus,penalty,net,st.std.l,""]);
    });
    if(semLocked){rows.push(["---","SEMESTER LOCKED — no edits permitted after this export"]);}
    const csv=rows.map(r=>r.join(",")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download=`${unit?.code}_${selClass}_Attendance.csv`;a.click();
    writeAudit(session.id,"CSV Export",`Exported ${unit?.code} for ${cls?.code}`);
  };

  return(
    <div className="slide-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <h2 style={{fontWeight:700,fontSize:18}}>Attendance Register</h2>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <select className="input" style={{width:"auto",fontSize:12}} value={selUnit} onChange={e=>setSelUnit(e.target.value)}>
            {myUnits.map(u=><option key={u.id} value={u.id}>{u.code}</option>)}
          </select>
          <select className="input" style={{width:"auto",fontSize:12}} value={selClass} onChange={e=>setSelClass(e.target.value)}>
            {unitClasses.map(c=><option key={c.id} value={c.id}>{c.code}</option>)}
          </select>
          <button className="btn btn-green btn-sm" onClick={exportCSV}>📥 Export CSV</button>
        </div>
      </div>
      {semLocked&&<div style={{background:"#FEE2E2",borderRadius:10,padding:"9px 14px",fontSize:13,color:"#DC2626",marginBottom:12,fontWeight:600}}>🔒 Semester is locked — no edits permitted. Export only.</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {[["Present",presentIds.size,"#059669"],["Absent",enrolled.length-presentIds.size,"#DC2626"],["Total",enrolled.length,"#2563EB"],["Today",todayStr().slice(5),"#64748b"]].map(([l,v,c])=>(
          <div key={l} className="card-sm" style={{textAlign:"center",borderTop:`3px solid ${c}`}}>
            <div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div>
            <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
      <div className="card" style={{overflowX:"auto"}}>
        <table>
          <thead><tr><th>Student</th><th>Adm. No.</th><th>Time In</th><th>Status</th><th>Sem %</th><th>Bonus</th>{!semLocked&&<th>Mark</th>}</tr></thead>
          <tbody>
            {enrolled.map(s=>{
              const rec=todayRecs.find(r=>r.studentId===s.id);
              const st=getStats(s.id);
              return(
                <tr key={s.id}>
                  <td><div style={{display:"flex",alignItems:"center",gap:8}}><Av i={s.photo} size={28}/><span style={{fontWeight:600}}>{s.name}</span></div></td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#6B7FBD"}}>{s.adm}</td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>{fmtTime(rec?.time)}</td>
                  <td>
                    {rec?<span className="badge" style={{background:rec.status==="late"?"#FEF3C7":"#D1FAE5",color:rec.status==="late"?"#92400E":"#065F46"}}>{rec.status==="late"?"⚠ Late":"✓ Present"}</span>
                       :<span className="badge" style={{background:"#FEE2E2",color:"#DC2626"}}>✗ Absent</span>}
                  </td>
                  <td><Barpct pct={st.pct}/></td>
                  <td style={{fontWeight:700,color:"#2563EB"}}>+{st.bonus}</td>
                  {!semLocked&&<td style={{display:"flex",gap:5}}>
                    {!rec&&<><button className="btn btn-green btn-sm" onClick={()=>mark(s.id,"present")}>Present</button><button className="btn btn-amber btn-sm" onClick={()=>mark(s.id,"late")}>Late</button></>}
                  </td>}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Timetable Manager ────────────────────────────────────────────────────────
function TimetableManager({session,units,classes,timetable,setTimetable,pushNotif,myUnits,role,semLocked}){
  const visibleUnits=myUnits||units.filter(u=>u.active);
  const visibleTT=timetable.filter(t=>visibleUnits.some(u=>u.id===t.unitId));
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({});
  const[editing,setEditing]=useState(null);
  const[selDay,setSelDay]=useState(todayDow()||"Mon");

  const daySlots=visibleTT.filter(t=>t.day===selDay).sort((a,b)=>a.startTime.localeCompare(b.startTime));

  const openAdd=()=>{ setForm({unitId:visibleUnits[0]?.id||"",classId:"",day:"Mon",startTime:"08:00",room:"",type:"lecture",semester:"Sem 2 2025",isMakeup:false}); setEditing(null); setModal("form"); };
  const openEdit=tt=>{ setForm({...tt}); setEditing(tt); setModal("form"); };
  const openCancel=tt=>{ setForm({...tt,cancelReason:""}); setModal("cancel"); };
  const openMakeup=tt=>{ setForm({ttId:tt.id,unitId:tt.unitId,classId:tt.classId,day:"Mon",startTime:"08:00",room:tt.room,type:tt.type,semester:tt.semester,isMakeup:true}); setEditing(null); setModal("makeup"); };

  const save=()=>{
    if(!form.unitId||!form.day||!form.startTime||!form.room) return;
    const unit=units.find(u=>u.id===form.unitId);
    const cls=classes.find(c=>c.id===form.classId)||classes.find(c=>unit?.classIds.includes(c.id));
    const entry={...form,classId:form.classId||cls?.id||"",cancelled:false};
    if(editing){
      const old=timetable.find(t=>t.id===editing.id);
      setTimetable(prev=>prev.map(t=>t.id===editing.id?{...t,...entry}:t));
      if(old.day!==entry.day||old.startTime!==entry.startTime||old.room!==entry.room){
        const affectedStudents=classes.find(c=>c.id===entry.classId)?.students||[];
        pushNotif([...affectedStudents],`📅 Class Rescheduled`,`${unit?.name} moved to ${entry.day} at ${entry.startTime} in ${entry.room}.`,"reschedule");
        writeAudit(session.id,"Reschedule",`${unit?.code} moved to ${entry.day} ${entry.startTime}`);
      }
    } else {
      setTimetable(prev=>[...prev,{...entry,id:uid(),cancelledDates:[]}]);
      writeAudit(session.id,"Add slot",`Added ${unit?.code} ${entry.day} ${entry.startTime}`);
    }
    setModal(null);
  };

  const cancelSlot=()=>{
    const tt=timetable.find(t=>t.id===form.id);
    const unit=units.find(u=>u.id===tt?.unitId);
    const affectedStudents=classes.find(c=>c.id===tt?.classId)?.students||[];
    setTimetable(prev=>prev.map(t=>t.id===form.id?{...t,cancelled:true,cancelReason:form.cancelReason}:t));
    pushNotif([...affectedStudents],`❌ Class Cancelled`,`${unit?.name} on ${tt?.day} at ${tt?.startTime} has been cancelled. ${form.cancelReason?"Reason: "+form.cancelReason:""}`.trim(),"reschedule");
    // Check consecutive cancels
    const unitCancels=timetable.filter(t=>t.unitId===tt?.unitId&&t.classId===tt?.classId&&t.cancelled).length+1;
    const makeups=timetable.filter(t=>t.unitId===tt?.unitId&&t.isMakeup).length;
    if(unitCancels-makeups>=MAX_CANCELS){
      pushNotif(["ADMIN"],`⚠ ${MAX_CANCELS}+ Cancellations`,`${unit?.name} (${INIT_LECTURERS[unit?.lecturerId]?.name}) has ${unitCancels} cancellations with only ${makeups} make-up classes.`,"warning");
    }
    writeAudit(session.id,"Cancel class",`${unit?.code} ${tt?.day} ${tt?.startTime} cancelled — ${form.cancelReason}`);
    setModal(null);
  };

  const addMakeup=()=>{
    if(!form.day||!form.startTime||!form.room) return;
    const unit=units.find(u=>u.id===form.unitId);
    const affectedStudents=classes.find(c=>c.id===form.classId)?.students||[];
    setTimetable(prev=>[...prev,{...form,id:uid(),cancelled:false,cancelledDates:[]}]);
    pushNotif([...affectedStudents],`🔄 Make-up Class Added`,`${unit?.name} make-up on ${form.day} at ${form.startTime} in ${form.room}.`,"info");
    writeAudit(session.id,"Makeup class",`${unit?.code} makeup added ${form.day} ${form.startTime}`);
    setModal(null);
  };

  const deleteSlot=(id)=>{
    if(!window.confirm("Remove this slot permanently?")) return;
    setTimetable(prev=>prev.filter(t=>t.id!==id));
    writeAudit(session.id,"Delete slot","Slot removed from timetable");
  };

  return(
    <div className="slide-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontWeight:700,fontSize:18}}>Timetable Manager</h2>
        {!semLocked&&<button className="btn btn-blue btn-sm" onClick={openAdd}>+ Add Slot</button>}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        {DAYS.map(d=>{
          const hasLive=visibleTT.some(t=>t.day===d&&slotStatus(t).live);
          return(
            <button key={d} onClick={()=>setSelDay(d)} style={{border:"none",borderRadius:10,padding:"9px 18px",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:600,flexShrink:0,background:selDay===d?"#0a0f2e":"#fff",color:selDay===d?"#fff":hasLive?"#DC2626":"#64748b",boxShadow:selDay===d?"0 4px 12px rgba(0,0,0,.15)":"0 1px 4px rgba(0,0,0,.06)"}}>
              {d}{d===todayDow()&&<span style={{marginLeft:4,fontSize:10,color:selDay===d?"rgba(255,255,255,.5)":"#94a3b8"}}>today</span>}
            </button>
          );
        })}
      </div>

      {daySlots.length===0?<div className="card" style={{textAlign:"center",padding:32,color:"#94a3b8"}}>No classes on {selDay}.</div>
      :daySlots.map(tt=>{
        const unit=units.find(u=>u.id===tt.unitId);
        const col=unitColor(tt.unitId);
        const st=slotStatus(tt);
        const cls=classes.find(c=>c.id===tt.classId);
        return(
          <div key={tt.id} className="card" style={{marginBottom:10,borderLeft:`4px solid ${tt.isMakeup?"#059669":tt.cancelled?"#DC2626":col}`,opacity:tt.cancelled?.65:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:col,fontWeight:700}}>{unit?.code}</span>
                  <span className="badge" style={{background:"#EEF2FF",color:"#4338CA",fontSize:10}}>{cls?.code}</span>
                  {tt.isMakeup&&<span className="badge" style={{background:"#D1FAE5",color:"#065F46"}}>🔄 Make-up</span>}
                  {tt.cancelled&&<span className="badge" style={{background:"#FEE2E2",color:"#DC2626"}}>❌ Cancelled</span>}
                  {st.live&&<span className="badge" style={{background:"#FEE2E2",color:"#DC2626"}}>🔴 LIVE</span>}
                </div>
                <div style={{fontWeight:700,fontSize:15}}>{unit?.name}</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{tt.startTime} – {addHrs(tt.startTime,UNIT_DURATION)} · {tt.room} · {tt.type}</div>
                {tt.cancelReason&&<div style={{fontSize:12,color:"#DC2626",marginTop:2}}>Reason: {tt.cancelReason}</div>}
              </div>
              {!semLocked&&!tt.cancelled&&(
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(tt)}>✏ Edit</button>
                  <button className="btn btn-amber btn-sm" onClick={()=>openCancel(tt)}>❌ Cancel</button>
                  <button className="btn btn-green btn-sm" onClick={()=>openMakeup(tt)}>🔄 Makeup</button>
                  <button className="btn btn-red btn-sm" style={{background:"#FEE2E2",color:"#DC2626"}} onClick={()=>deleteSlot(tt.id)}>🗑</button>
                </div>
              )}
            </div>
          </div>
        );
      })}

      {/* Add/Edit modal */}
      {(modal==="form"||modal==="makeup")&&(
        <div className="modal-bg" onClick={()=>setModal(null)}>
          <div className="modal pop-in" onClick={e=>e.stopPropagation()}>
            <h3 style={{fontWeight:700,fontSize:17,marginBottom:18}}>{modal==="makeup"?"Add Make-up Class":editing?"Edit Slot":"Add Class Slot"}</h3>
            <Fld label="UNIT">
              <select className="input" value={form.unitId||""} onChange={e=>setForm(f=>({...f,unitId:e.target.value}))}>
                {visibleUnits.map(u=><option key={u.id} value={u.id}>{u.code} — {u.name}</option>)}
              </select>
            </Fld>
            <Fld label="CLASS">
              <select className="input" value={form.classId||""} onChange={e=>setForm(f=>({...f,classId:e.target.value}))}>
                <option value="">-- Select class --</option>
                {classes.filter(c=>{const u=units.find(x=>x.id===form.unitId);return u?.classIds.includes(c.id);}).map(c=><option key={c.id} value={c.id}>{c.code} — {c.name}</option>)}
              </select>
            </Fld>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Fld label="DAY"><select className="input" value={form.day||"Mon"} onChange={e=>setForm(f=>({...f,day:e.target.value}))}>{DAYS.map(d=><option key={d}>{d}</option>)}</select></Fld>
              <Fld label="START TIME"><select className="input" value={form.startTime||"08:00"} onChange={e=>setForm(f=>({...f,startTime:e.target.value}))}>{TIMES.map(t=><option key={t}>{t}</option>)}</select></Fld>
            </div>
            <Fld label="END TIME (auto)"><input className="input" value={addHrs(form.startTime||"08:00",UNIT_DURATION)} disabled style={{background:"#F0F4FF",color:"#94a3b8"}}/></Fld>
            <Fld label="ROOM / VENUE"><input className="input" placeholder="e.g. B-12, IT Lab" value={form.room||""} onChange={e=>setForm(f=>({...f,room:e.target.value}))}/></Fld>
            <Fld label="TYPE"><select className="input" value={form.type||"lecture"} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>{["lecture","practical","tutorial","CAT"].map(t=><option key={t}>{t}</option>)}</select></Fld>
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button className="btn btn-blue" style={{flex:1}} onClick={modal==="makeup"?addMakeup:save}>Save</button>
              <button className="btn btn-outline" onClick={()=>setModal(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Cancel modal */}
      {modal==="cancel"&&(
        <div className="modal-bg" onClick={()=>setModal(null)}>
          <div className="modal pop-in" onClick={e=>e.stopPropagation()}>
            <h3 style={{fontWeight:700,fontSize:17,marginBottom:8}}>Cancel Class</h3>
            <p style={{fontSize:13,color:"#64748b",marginBottom:16}}>All enrolled students will be notified. This session will count as missed for attendance unless a make-up is added.</p>
            <Fld label="REASON (sent to students)"><textarea className="input" placeholder="e.g. Lecturer on conference, public holiday…" value={form.cancelReason||""} onChange={e=>setForm(f=>({...f,cancelReason:e.target.value}))}/></Fld>
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button className="btn btn-red" style={{flex:1}} onClick={cancelSlot}>Confirm Cancellation</button>
              <button className="btn btn-outline" onClick={()=>setModal(null)}>Back</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Unit Manager ─────────────────────────────────────────────────────────────
function UnitManager({session,units,setUnits,classes,pushNotif,myUnits,isAdmin}){
  const visible=isAdmin?units:myUnits;
  const[modal,setModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[form,setForm]=useState({});

  const openAdd=()=>{ setForm({name:"",code:"",creditHours:3,lecturerId:session.role==="lecturer"?session.id:"L01",classIds:[],active:true}); setEditing(null); setModal(true); };
  const openEdit=u=>{ setForm({...u}); setEditing(u); setModal(true); };

  const save=()=>{
    if(!form.name||!form.code) return;
    if(editing){ setUnits(prev=>prev.map(u=>u.id===editing.id?{...u,...form}:u)); writeAudit(session.id,"Edit unit",`${form.code}`); }
    else { setUnits(prev=>[...prev,{...form,id:uid()}]); writeAudit(session.id,"Add unit",`${form.code} — ${form.name}`); }
    setModal(false);
  };

  const toggleActive=id=>{
    const u=units.find(x=>x.id===id);
    setUnits(prev=>prev.map(x=>x.id===id?{...x,active:!x.active}:x));
    writeAudit(session.id,u?.active?"Suspend unit":"Reinstate unit",`${u?.code}`);
  };

  return(
    <div className="slide-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontWeight:700,fontSize:18}}>Units {isAdmin?"(All)":"(My Units)"}</h2>
        <button className="btn btn-blue btn-sm" onClick={openAdd}>+ Add Unit</button>
      </div>
      {visible.map(u=>{
        const lec=INIT_LECTURERS[u.lecturerId];
        return(
          <div key={u.id} className="card" style={{marginBottom:12,borderLeft:`4px solid ${unitColor(u.id)}`,opacity:u.active?1:.6}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{display:"flex",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:unitColor(u.id),fontWeight:700}}>{u.code}</span>
                  <span className="badge" style={{background:u.active?"#D1FAE5":"#FEE2E2",color:u.active?"#065F46":"#DC2626"}}>{u.active?"Active":"Suspended"}</span>
                  <span className="badge" style={{background:"#EEF2FF",color:"#4338CA"}}>{u.creditHours} CH · {UNIT_DURATION}h/session</span>
                </div>
                <div style={{fontWeight:700,fontSize:15}}>{u.name}</div>
                {isAdmin&&<div style={{fontSize:12,color:"#64748b",marginTop:1}}>{lec?.name} · {lec?.dept}</div>}
                <div style={{fontSize:12,color:"#94a3b8",marginTop:1}}>{u.classIds.map(cid=>classes.find(c=>c.id===cid)?.code).filter(Boolean).join(", ")}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(u)}>✏ Edit</button>
                <button className="btn btn-sm" style={{background:u.active?"#FEF3C7":"#D1FAE5",color:u.active?"#92400E":"#065F46"}} onClick={()=>toggleActive(u.id)}>{u.active?"Suspend":"Reinstate"}</button>
              </div>
            </div>
          </div>
        );
      })}

      {modal&&(
        <div className="modal-bg" onClick={()=>setModal(false)}>
          <div className="modal pop-in" onClick={e=>e.stopPropagation()}>
            <h3 style={{fontWeight:700,fontSize:17,marginBottom:18}}>{editing?"Edit Unit":"Add Unit"}</h3>
            <Fld label="UNIT NAME"><input className="input" placeholder="e.g. Engineering Mathematics III" value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Fld>
            <Fld label="UNIT CODE"><input className="input" placeholder="e.g. MAT 301" value={form.code||""} onChange={e=>setForm(f=>({...f,code:e.target.value}))}/></Fld>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Fld label="CREDIT HOURS"><select className="input" value={form.creditHours||3} onChange={e=>setForm(f=>({...f,creditHours:Number(e.target.value)}))}>
                {[1,2,3,4,5].map(n=><option key={n}>{n}</option>)}
              </select></Fld>
              {isAdmin&&<Fld label="LECTURER"><select className="input" value={form.lecturerId||"L01"} onChange={e=>setForm(f=>({...f,lecturerId:e.target.value}))}>
                {Object.values(INIT_LECTURERS).map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
              </select></Fld>}
            </div>
            <Fld label="ASSIGNED CLASSES">
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
                {classes.map(c=>{
                  const checked=(form.classIds||[]).includes(c.id);
                  return(
                    <label key={c.id} style={{display:"flex",alignItems:"center",gap:5,fontSize:13,cursor:"pointer",background:checked?"#EEF2FF":"#F8FAFF",borderRadius:8,padding:"6px 10px",border:`1px solid ${checked?"#2563EB":"#E0E7FF"}`}}>
                      <input type="checkbox" checked={checked} onChange={()=>setForm(f=>({...f,classIds:checked?f.classIds.filter(id=>id!==c.id):[...(f.classIds||[]),c.id]}))} style={{marginRight:2}}/>
                      {c.code}
                    </label>
                  );
                })}
              </div>
            </Fld>
            <div style={{display:"flex",gap:10,marginTop:10}}>
              <button className="btn btn-blue" style={{flex:1}} onClick={save}>Save</button>
              <button className="btn btn-outline" onClick={()=>setModal(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Penalty Manager ──────────────────────────────────────────────────────────
function PenaltyManager({session,units,classes,records,setRecords,myUnits,pushNotif,semLocked}){
  const[selUnit,setSelUnit]=useState(myUnits[0]?.id||"");
  const unit=units.find(u=>u.id===selUnit);
  const unitClasses=classes.filter(c=>unit?.classIds.includes(c.id));
  const[selClass,setSelClass]=useState(unitClasses[0]?.id||"");
  const cls=classes.find(c=>c.id===selClass);
  const enrolled=(cls?.students||[]).map(id=>INIT_STUDENTS[id]).filter(Boolean);
  const[penaltyModal,setPenaltyModal]=useState(null);
  const[penaltyForm,setPenaltyForm]=useState({pts:0,note:"",forgiven:false});

  const getStudentPenalty=(studentId)=>{
    const recs=records.filter(r=>r.studentId===studentId&&r.unitId===selUnit);
    return recs.reduce((a,r)=>a+((r.penalty||0)*(r.penaltyForgiven?0:1)),0);
  };
  const getBonus=(studentId)=>{
    const recs=records.filter(r=>r.studentId===studentId&&r.unitId===selUnit);
    const attended=recs.filter(r=>r.status==="present"||r.status==="late").length;
    const total=20; // simplified
    return bonusMark(Math.round(attended/total*100));
  };

  const applyPenalty=()=>{
    if(!penaltyModal||semLocked) return;
    const pts=Math.min(10,Math.max(0,Number(penaltyForm.pts)));
    setRecords(prev=>{
      const updated=[...prev];
      // Find or create a penalty record
      const existingIdx=updated.findIndex(r=>r.studentId===penaltyModal.id&&r.unitId===selUnit&&r.type==="penalty");
      const rec={id:uid(),studentId:penaltyModal.id,ttId:"PENALTY",unitId:selUnit,classId:selClass,date:todayStr(),time:nowISO(),status:"penalty",penalty:pts,penaltyNote:penaltyForm.note,penaltyForgiven:penaltyForm.forgiven,synced:true};
      if(existingIdx>=0) updated[existingIdx]={...updated[existingIdx],...rec};
      else updated.push(rec);
      return updated;
    });
    pushNotif([penaltyModal.id],penaltyForm.forgiven?"✅ Penalty Forgiven":`⚖ Late Penalty Applied`,penaltyForm.forgiven?`Your late penalty in ${unit?.name} has been forgiven by ${INIT_LECTURERS[session.id]?.name}.`:`A -${pts} mark penalty has been applied to your ${unit?.name} attendance marks. Reason: ${penaltyForm.note||"Not specified"}.`,"penalty");
    writeAudit(session.id,penaltyForm.forgiven?"Forgive penalty":"Apply penalty",`${penaltyModal.name} in ${unit?.code}: ${penaltyForm.forgiven?"forgiven":"−"+pts} pts — ${penaltyForm.note}`);
    setPenaltyModal(null);
  };

  return(
    <div className="slide-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontWeight:700,fontSize:18}}>Penalties & Marks</h2>
          <p style={{fontSize:13,color:"#64748b",marginTop:2}}>Apply or forgive late penalties (max -10). Students are notified.</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <select className="input" style={{width:"auto",fontSize:12}} value={selUnit} onChange={e=>setSelUnit(e.target.value)}>
            {myUnits.map(u=><option key={u.id} value={u.id}>{u.code}</option>)}
          </select>
          <select className="input" style={{width:"auto",fontSize:12}} value={selClass} onChange={e=>setSelClass(e.target.value)}>
            {unitClasses.map(c=><option key={c.id} value={c.id}>{c.code}</option>)}
          </select>
        </div>
      </div>
      {semLocked&&<div style={{background:"#FEE2E2",borderRadius:10,padding:"9px 14px",fontSize:13,color:"#DC2626",marginBottom:12,fontWeight:600}}>🔒 Semester locked — no penalty changes permitted.</div>}
      <div className="card" style={{overflowX:"auto"}}>
        <table>
          <thead><tr><th>Student</th><th>Attendance %</th><th>Bonus</th><th>Penalty</th><th>Net</th><th>Action</th></tr></thead>
          <tbody>
            {enrolled.map(s=>{
              const penalty=getStudentPenalty(s.id);
              const bonus=getBonus(s.id);
              const net=Math.max(0,bonus-penalty);
              const recs=records.filter(r=>r.studentId===s.id&&r.unitId===selUnit);
              const attended=recs.filter(r=>r.status==="present"||r.status==="late").length;
              const pct=Math.round(attended/20*100);
              return(
                <tr key={s.id}>
                  <td><div style={{display:"flex",alignItems:"center",gap:8}}><Av i={s.photo} size={28}/><span style={{fontWeight:600}}>{s.name}</span></div></td>
                  <td><Barpct pct={pct}/></td>
                  <td style={{fontWeight:700,color:"#2563EB"}}>+{bonus}</td>
                  <td style={{fontWeight:700,color:penalty>0?"#DC2626":"#94a3b8"}}>{penalty>0?`−${penalty}`:"—"}</td>
                  <td style={{fontWeight:800,color:net>0?"#059669":"#DC2626"}}>+{net}</td>
                  <td>{!semLocked&&<button className="btn btn-ghost btn-sm" onClick={()=>{setPenaltyModal(s);setPenaltyForm({pts:penalty||0,note:"",forgiven:false});}}>⚖ Manage</button>}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {penaltyModal&&(
        <div className="modal-bg" onClick={()=>setPenaltyModal(null)}>
          <div className="modal pop-in" onClick={e=>e.stopPropagation()}>
            <h3 style={{fontWeight:700,fontSize:17,marginBottom:4}}>Manage Marks</h3>
            <p style={{fontSize:13,color:"#64748b",marginBottom:16}}>{penaltyModal.name} · {unit?.code}</p>
            <Fld label="PENALTY MARKS (0–10)">
              <input className="input" type="number" min={0} max={10} value={penaltyForm.pts} onChange={e=>setPenaltyForm(f=>({...f,pts:Math.min(10,Math.max(0,Number(e.target.value)))}))}/>
            </Fld>
            <Fld label="REASON / NOTE">
              <textarea className="input" placeholder="Reason for penalty or forgiveness…" value={penaltyForm.note} onChange={e=>setPenaltyForm(f=>({...f,note:e.target.value}))}/>
            </Fld>
            <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,cursor:"pointer",marginBottom:16}}>
              <input type="checkbox" checked={penaltyForm.forgiven} onChange={e=>setPenaltyForm(f=>({...f,forgiven:e.target.checked}))} style={{width:16,height:16}}/>
              Forgive / waive this penalty (student will be notified)
            </label>
            <div style={{display:"flex",gap:10}}>
              <button className="btn btn-blue" style={{flex:1}} onClick={applyPenalty}>Apply</button>
              <button className="btn btn-outline" onClick={()=>setPenaltyModal(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Admin: Today ─────────────────────────────────────────────────────────────
function AdminToday({units,classes,timetable,records,lecRecs,pushNotif,session}){
  const dow=todayDow();
  const todaySlots=timetable.filter(t=>t.day===dow&&!t.cancelled);

  return(
    <div className="slide-in">
      <h2 style={{fontWeight:700,fontSize:20,marginBottom:18}}>Today's Overview — {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</h2>

      {todaySlots.length===0?(
        <div className="card" style={{textAlign:"center",padding:40,color:"#94a3b8"}}>No classes scheduled today.</div>
      ):todaySlots.map(tt=>{
        const unit=units.find(u=>u.id===tt.unitId);
        const cls=classes.find(c=>c.id===tt.classId);
        const lec=INIT_LECTURERS[unit?.lecturerId||""];
        const st=slotStatus(tt);
        const lecCheckedIn=lecRecs.find(r=>r.lecturerId===unit?.lecturerId&&r.ttId===tt.id&&r.date===todayStr());
        const enrolled=(cls?.students||[]).map(id=>INIT_STUDENTS[id]).filter(Boolean).filter(s=>s.status!=="deferred");
        const studentRecs=records.filter(r=>r.ttId===tt.id&&r.date===todayStr());
        const present=studentRecs.filter(r=>r.status==="present"||r.status==="late").length;
        const pct=enrolled.length>0?Math.round(present/enrolled.length*100):0;
        return(
          <div key={tt.id} className="card" style={{marginBottom:14,border:st.live?"2px solid #DC2626":"2px solid transparent"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12,marginBottom:12}}>
              <div>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
                  {st.live&&<span className="live-dot"/>}
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:unitColor(unit?.id||"")}}>{unit?.code}</span>
                  {st.live&&<span className="badge" style={{background:"#FEE2E2",color:"#DC2626"}}>🔴 LIVE</span>}
                  {st.status==="upcoming"&&<span className="badge" style={{background:"#EEF2FF",color:"#2563EB"}}>in {st.minsUntil}m</span>}
                  {st.status==="ended"&&<span className="badge" style={{background:"#F8FAFF",color:"#94a3b8"}}>Ended</span>}
                </div>
                <div style={{fontWeight:700,fontSize:16}}>{unit?.name}</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{tt.startTime}–{addHrs(tt.startTime,UNIT_DURATION)} · {tt.room} · {cls?.code}</div>
              </div>
              {/* Lecturer status */}
              <div style={{background:lecCheckedIn?"#D1FAE5":"#FEE2E2",borderRadius:12,padding:"10px 16px",textAlign:"center",minWidth:130}}>
                <div style={{fontSize:11,fontWeight:600,color:lecCheckedIn?"#065F46":"#DC2626",marginBottom:2}}>LECTURER</div>
                <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
                  <Av i={lec?.photo||"LEC"} size={24} g={lecCheckedIn?"135deg,#059669,#34d399":"135deg,#DC2626,#f87171"}/>
                  <span style={{fontWeight:600,fontSize:13,color:lecCheckedIn?"#065F46":"#DC2626"}}>{lec?.name?.split(" ")[0]}</span>
                </div>
                <div style={{fontSize:11,color:lecCheckedIn?"#065F46":"#DC2626",marginTop:2}}>{lecCheckedIn?"✓ Checked in":"✗ Not checked in"}</div>
              </div>
            </div>
            {/* Student attendance bar */}
            <div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6}}>
                <span style={{fontWeight:600}}>Student Attendance</span>
                <span style={{color:"#64748b"}}>{present}/{enrolled.length} present</span>
              </div>
              <div style={{height:7,background:"#EEF2FF",borderRadius:99,overflow:"hidden",marginBottom:8}}>
                <div style={{width:`${pct}%`,height:"100%",background:pct>=75?"#059669":pct>=50?"#F59E0B":"#DC2626",borderRadius:99,transition:"width .6s"}}/>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {enrolled.slice(0,12).map(s=>{
                  const r=studentRecs.find(x=>x.studentId===s.id);

                    <div key={s.id} title={`${s.name}: ${r?r.status:"absent"}`} style={{width:28,height:28,borderRadius:"50%",background:r?(r.status==="late"?"#FEF3C7":"#D1FAE5"):"#FEE2E2",border:`2px solid ${r?(r.status==="late"?"#D97706":"#059669"):"#DC2626"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:r?(r.status==="late"?"#92400E":"#065F46"):"#DC2626"}}>
                      {s.photo}

                {enrolled.length>12&&<div style={{width:28,height:28,borderRadius:"50%",background:"#EEF2FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#6B7FBD",fontWeight:700}}>+{enrolled.length-12}</div>}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function AdminClasses({classes,setClasses,units,records,session,pushNotif}){

  const[editing,setEditing]=useState(null);
  const[form,setForm]=useState({});
  const[importing,setImporting]=useState(false);

  const importFromMoodle=async()=>{
    setImporting(true);
    await delay(1500);
    setImporting(false);
    pushNotif(["ADMIN"],"✅ Moodle Sync Complete","Classes and student data synced from elearning.tum.ac.ke","info");
    writeAudit(session.id,"Moodle import","Classes synced from Moodle");
  };

  const openAdd=()=>{ setForm({code:"",name:"",intakeYear:2024,intakeSem:"September",currentYear:1,students:[],hodId:"H01"}); setEditing(null); setModal(true); };
  const openEdit=c=>{ setForm({...c}); setEditing(c); setModal(true); };

  const save=()=>{
    if(!form.code||!form.name) return;
    if(editing){ setClasses(prev=>prev.map(c=>c.id===editing.id?{...c,...form}:c)); }
    else { setClasses(prev=>[...prev,{...form,id:uid()}]); }

    <div className="slide-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <h2 style={{fontWeight:700,fontSize:18}}>Classes & Students</h2>

          <button className="btn btn-purple btn-sm" onClick={importFromMoodle} disabled={importing}>

          </button>
          <button className="btn btn-blue btn-sm" onClick={openAdd}>+ Add Class</button>
        </div>
      </div>
      {classes.map(cls=>{
        const students=(cls.students||[]).map(id=>INIT_STUDENTS[id]).filter(Boolean);
        const activeStudents=students.filter(s=>s.status!=="deferred");
        return(
          <div key={cls.id} className="card" style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:800,color:"#7C3AED"}}>{cls.code}</span>
                  <span className="badge" style={{background:"#EEF2FF",color:"#4338CA"}}>Year {cls.currentYear}</span>
                  <span className="badge" style={{background:"#F3E8FF",color:"#7C3AED"}}>{cls.intakeSem} {cls.intakeYear}</span>
                </div>
                <div style={{fontWeight:700,fontSize:15}}>{cls.name}</div>

              <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(cls)}>✏ Edit</button>
