              {students.slice(0,8).map(s=>(
                <div key={s.id} style={{display:"flex",alignItems:"center",gap:5,background:s.status==="deferred"?"#FEF2F2":"#F8FAFF",borderRadius:8,padding:"4px 10px",fontSize:12,border:`1px solid ${s.status==="deferred"?"#FECACA":"#E0E7FF"}`}}>
                  <Av i={s.photo} size={18} g={s.status==="deferred"?"135deg,#DC2626,#f87171":"135deg,#2563EB,#0ea5e9"}/>
                  <span style={{fontWeight:500}}>{s.name.split(" ")[0]}</span>
                  {s.status==="deferred"&&<span style={{color:"#DC2626",fontSize:10}}>deferred</span>}
                </div>
              ))}
              {students.length>8&&<div style={{background:"#EEF2FF",borderRadius:8,padding:"4px 10px",fontSize:12,color:"#6B7FBD"}}>+{students.length-8} more</div>}
            </div>
          </div>
        );
      })}

      {modal&&(
        <div className="modal-bg" onClick={()=>setModal(false)}>
          <div className="modal pop-in" onClick={e=>e.stopPropagation()}>
            <h3 style={{fontWeight:700,fontSize:17,marginBottom:18}}>{editing?"Edit Class":"Add Class"}</h3>
            <Fld label="CLASS CODE"><input className="input" placeholder="e.g. BSCS/SEP/2024" value={form.code||""} onChange={e=>setForm(f=>({...f,code:e.target.value}))}/></Fld>
            <Fld label="PROGRAMME NAME"><input className="input" placeholder="e.g. BSc Computer Science" value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Fld>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Fld label="INTAKE YEAR"><input className="input" type="number" value={form.intakeYear||2024} onChange={e=>setForm(f=>({...f,intakeYear:Number(e.target.value)}))}/></Fld>
              <Fld label="INTAKE SEMESTER"><select className="input" value={form.intakeSem||"September"} onChange={e=>setForm(f=>({...f,intakeSem:e.target.value}))}>
                {["January","May","September"].map(s=><option key={s}>{s}</option>)}
              </select></Fld>
            </div>
            <Fld label="CURRENT YEAR OF STUDY"><select className="input" value={form.currentYear||1} onChange={e=>setForm(f=>({...f,currentYear:Number(e.target.value)}))}>
              {[1,2,3,4].map(n=><option key={n}>Year {n}</option>)}
            </select></Fld>
            <div style={{background:"#FEF9C3",borderRadius:10,padding:"9px 13px",fontSize:12,color:"#92400E"}}>
              💡 Student registration and enrolment status is read daily from elearning.tum.ac.ke. Use "Import from Moodle" to sync now.
            </div>
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button className="btn btn-blue" style={{flex:1}} onClick={save}>Save Class</button>
              <button className="btn btn-outline" onClick={()=>setModal(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Admin: Lecturers ─────────────────────────────────────────────────────────
function AdminLecturers({units,timetable,lecRecs}){
  const lecs=Object.values(INIT_LECTURERS);
  return(
    <div className="slide-in">
      <h2 style={{fontWeight:700,fontSize:18,marginBottom:16}}>Lecturers</h2>
      {lecs.map(l=>{
        const myUnits=units.filter(u=>u.lecturerId===l.id&&u.active);
        const mySlots=timetable.filter(t=>myUnits.some(u=>u.id===t.unitId)&&!t.cancelled);
        const myRecs=lecRecs.filter(r=>r.lecturerId===l.id);
        const pct=mySlots.length>0?Math.round(myRecs.length/mySlots.length*100):0;
        return(
          <div key={l.id} className="card" style={{marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <Av i={l.photo} size={46} g="135deg,#7C3AED,#a78bfa"/>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:16}}>{l.name}</div>
                <div style={{fontSize:12,color:"#64748b"}}>{l.email} · {l.dept}</div>
                <div style={{fontSize:12,color:"#94a3b8",marginTop:1}}>{myUnits.length} active unit{myUnits.length!==1?"s":""} · {myRecs.length}/{mySlots.length} sessions delivered</div>
              </div>
              <div style={{textAlign:"center",minWidth:70}}>
                <div style={{fontSize:26,fontWeight:800,color:pct>=80?"#059669":"#D97706"}}>{pct}%</div>
                <div style={{fontSize:11,color:"#94a3b8"}}>Attendance</div>
                <Barpct pct={pct}/>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── Semester Archive ─────────────────────────────────────────────────────────
function SemesterArchive({session,semLocked,setSemLocked,records,units,classes,pushNotif,writeAudit}){
  const[confirm,setConfirm]=useState(false);
  const lockSemester=()=>{
    setSemLocked(true);
    pushNotif("all","🔒 Semester Locked","The current semester has been locked by admin. All attendance records are now final. No further edits are permitted.","info");
    writeAudit(session.id,"Semester lock","Semester 2 2025 locked — records frozen");
    setConfirm(false);
  };
  const exportAll=()=>{
    const rows=[["Student","Adm No","Class","Unit","Attended","Late","Absent","Total","Rate%","Bonus","Penalty","Net","Standing"]];
    classes.forEach(cls=>{
      cls.students.forEach(sId=>{
        const s=INIT_STUDENTS[sId]; if(!s) return;
        units.filter(u=>u.classIds.includes(cls.id)&&u.active).forEach(u=>{
          const recs=records.filter(r=>r.studentId===sId&&r.unitId===u.id);
          const attended=recs.filter(r=>r.status==="present"||r.status==="late").length;
          const lateCount=recs.filter(r=>r.status==="late").length;
          const total=20;
          const pct=Math.round(attended/total*100);
          const bonus=bonusMark(pct);
          const penalty=recs.reduce((a,r)=>a+((r.penalty||0)*(r.penaltyForgiven?0:1)),0);
          const net=Math.max(0,bonus-penalty);
          rows.push([s.name,s.adm,cls.code,u.code,attended,lateCount,total-attended,total,pct,bonus,penalty,net,standing(pct).l]);
        });
      });
    });
    const csv=rows.map(r=>r.join(",")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download=`TUM_Attendance_Sem2_2025${semLocked?"_FINAL":""}.csv`;a.click();
    writeAudit(session.id,"Export all CSV",semLocked?"FINAL export (locked)":"Draft export");
  };
  return(
    <div className="slide-in">
      <h2 style={{fontWeight:700,fontSize:18,marginBottom:6}}>Semester Archive</h2>
      <p style={{fontSize:13,color:"#64748b",marginBottom:18}}>Lock the semester to freeze all attendance records. After locking, no lecturer can modify marks or penalties.</p>
      <div className="card" style={{marginBottom:16,borderTop:`4px solid ${semLocked?"#DC2626":"#7C3AED"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>Semester 2 · 2024/2025</div>
            <div style={{fontSize:13,color:"#64748b"}}>Status: <strong style={{color:semLocked?"#DC2626":"#059669"}}>{semLocked?"🔒 LOCKED — Records Frozen":"🟢 Open"}</strong></div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button className="btn btn-green" onClick={exportAll}>📥 Export All CSV{semLocked?" (FINAL)":""}</button>
            {!semLocked&&<button className="btn btn-red" onClick={()=>setConfirm(true)}>🔒 Lock Semester</button>}
          </div>
        </div>
      </div>
      {semLocked&&<div style={{background:"#FEE2E2",borderRadius:12,padding:"14px 18px",fontSize:13,color:"#DC2626",fontWeight:500}}>
        ⚠ This semester is locked. All records are final. To make changes, contact your system administrator to unlock.
      </div>}
      {confirm&&(
        <div className="modal-bg">
          <div className="modal pop-in" style={{textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:10}}>🔒</div>
            <h3 style={{fontWeight:700,fontSize:18,marginBottom:8}}>Lock Semester?</h3>
            <p style={{color:"#64748b",fontSize:13,lineHeight:1.6,marginBottom:20}}>This will <strong>permanently freeze</strong> all attendance records for Semester 2 · 2024/2025. Lecturers will no longer be able to edit marks or penalties. This action cannot be undone.</p>
            <div style={{display:"flex",gap:12}}>
              <button className="btn btn-red" style={{flex:1}} onClick={lockSemester}>Yes, Lock Semester</button>
              <button className="btn btn-outline" style={{flex:1}} onClick={()=>setConfirm(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Audit Log ────────────────────────────────────────────────────────────────
function AuditLog(){
  const log=loadAudit();
  const roleColor={S:"#2563EB",L:"#059669",ADMIN:"#7C3AED",SYSTEM:"#94a3b8"};
  return(
    <div className="slide-in">
      <h2 style={{fontWeight:700,fontSize:18,marginBottom:16}}>Audit Log</h2>
      {log.length===0?<div className="card" style={{textAlign:"center",padding:36,color:"#94a3b8"}}>No audit entries yet.</div>
      :<div className="card" style={{overflowX:"auto"}}>
        <table>
          <thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Detail</th></tr></thead>
          <tbody>
            {log.map(e=>{
              const prefix=e.actor.slice(0,1);
              return(
                <tr key={e.id}>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtFull(e.at)}</td>
                  <td><span className="badge" style={{background:`${roleColor[prefix]||"#94a3b8"}15`,color:roleColor[prefix]||"#94a3b8"}}>{e.actor}</span></td>
                  <td style={{fontWeight:600,fontSize:13}}>{e.action}</td>
                  <td style={{fontSize:12,color:"#64748b"}}>{e.detail}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>}
    </div>
  );
}

// ─── Broadcast ────────────────────────────────────────────────────────────────
function Broadcast({session,pushNotif,notifs}){
  const[form,setForm]=useState({title:"",body:"",to:"all"});
  const send=()=>{
    if(!form.title||!form.body) return;
    pushNotif(form.to,form.title,form.body,"info");
    writeAudit(session.id,"Broadcast",`To: ${form.to} — "${form.title}"`);
    setForm({title:"",body:"",to:"all"});
  };
  return(
    <div className="slide-in">
      <h2 style={{fontWeight:700,fontSize:18,marginBottom:16}}>Broadcast Notification</h2>
      <div className="card" style={{maxWidth:520,marginBottom:20}}>
        <Fld label="SEND TO"><select className="input" value={form.to} onChange={e=>setForm(f=>({...f,to:e.target.value}))}>
          <option value="all">Everyone</option>
          <option value="students">All Students</option>
          <option value="lecturers">All Lecturers</option>
        </select></Fld>
        <Fld label="TITLE"><input className="input" placeholder="Notification title" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}/></Fld>
        <Fld label="MESSAGE"><textarea className="input" placeholder="Message…" value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))}/></Fld>
        <button className="btn btn-blue" style={{width:"100%"}} onClick={send}>📢 Send</button>
      </div>
      <h3 style={{fontWeight:600,fontSize:14,marginBottom:10}}>Recent broadcasts</h3>
      <NotifList notifs={notifs.slice(0,8)}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
//  SHARED MICRO-COMPONENTS
// ═══════════════════════════════════════════════════════════════════════════════
function QRCard({unit,cls,qrReady,payload}){
  const ref=useRef(null); const made=useRef(false);
  useEffect(()=>{
    if(!qrReady||!ref.current||made.current) return; made.current=true; ref.current.innerHTML="";
    new window.QRCode(ref.current,{text:payload,width:160,height:160,colorDark:"#0a0f2e",colorLight:"#fff",correctLevel:window.QRCode?.CorrectLevel?.H});
  },[qrReady,payload]);
  const col=unitColor(unit.id);
  return(
    <div className="card" style={{width:230,textAlign:"center",border:`2px solid ${col}22`}}>
      <div style={{background:`linear-gradient(135deg,${col},${col}99)`,borderRadius:10,padding:"10px 14px",marginBottom:12,color:"#fff"}}>
        <div style={{fontWeight:800,fontSize:14}}>{unit.code}</div>
        <div style={{opacity:.85,fontSize:12,marginTop:1}}>{cls?.code}</div>
      </div>
      <div ref={ref} style={{display:"flex",justifyContent:"center",marginBottom:10}}/>
      <div style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>Hand to class representative</div>
      <button className="btn btn-ghost btn-sm" style={{width:"100%"}} onClick={()=>{const c=ref.current?.querySelector("canvas");if(c){const a=document.createElement("a");a.href=c.toDataURL();a.download=`${unit.code}_${cls?.code}_QR.png`;a.click();}}}>↓ Download PNG</button>
    </div>
  );
}

function NotifList({notifs}){
  if(!notifs.length) return <div className="card" style={{textAlign:"center",padding:40,color:"#94a3b8"}}><div style={{fontSize:32,marginBottom:8}}>🔔</div>No notifications.</div>;
  const tc={reschedule:"#D97706",reminder:"#2563EB",penalty:"#7C3AED",warning:"#DC2626",info:"#059669"};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {notifs.map(n=>(
        <div key={n.id} className="card-sm" style={{borderLeft:`4px solid ${tc[n.type]||"#94a3b8"}`}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{n.title}</div>
          <div style={{fontSize:12,color:"#64748b",lineHeight:1.5}}>{n.body}</div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:5}}>{fmtFull(n.time)}</div>
        </div>
      ))}
    </div>
  );
}

function Av({i,size=36,g="135deg,#2563EB,#0ea5e9"}){
  return <div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(${g})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:Math.max(9,size*.28),fontWeight:700,color:"#fff",flexShrink:0}}>{i}</div>;
}
function Barpct({pct}){
  const c=pct>=75?"#059669":pct>=60?"#F59E0B":"#DC2626";
  return(<div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:50,height:5,background:"#EEF2FF",borderRadius:99,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:c,borderRadius:99}}/></div><span style={{fontSize:12,fontWeight:700,color:c}}>{pct}%</span></div>);
}
function Fld({label,children}){
  return <div style={{marginBottom:12}}><label style={{fontSize:11,fontWeight:600,color:"#374151",display:"block",marginBottom:5,letterSpacing:".06em"}}>{label}</label>{children}</div>;
}
function Spinner(){
  return <span className="spin" style={{width:13,height:13,border:"2px solid rgba(255,255,255,.3)",borderTop:"2px solid #fff",borderRadius:"50%",display:"inline-block",flexShrink:0}}/>;
}


// ─── Mount ───────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

// Hide loading screen once React has mounted
requestAnimationFrame(() => {
  setTimeout(() => {
    const ld = document.getElementById('loading');
    if (ld) { ld.style.opacity = '0'; setTimeout(() => ld.remove(), 400); }
  }, 600);
});
</script>
