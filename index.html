  window.db = firebase.firestore();

  // ── Firestore helpers exposed globally ───────────────────────────────────
  window.FB = {
    // Write a document (merge = update only specified fields)
    set: (col, id, data, merge=false) =>
      window.db.collection(col).doc(id).set(data, merge ? {merge:true} : {}),

    // Add with auto-id
    add: (col, data) =>
      window.db.collection(col).add(data),

    // Delete
    del: (col, id) =>
      window.db.collection(col).doc(id).delete(),

    // One-time read of whole collection
    getAll: async (col) => {
      const snap = await window.db.collection(col).get();
      return snap.docs.map(d => ({...d.data(), _docId: d.id}));
    },

    // Real-time listener on a collection
    listen: (col, cb, query) => {
      let ref = window.db.collection(col);
      if (query) ref = query(ref);
      return ref.onSnapshot(snap => {
        cb(snap.docs.map(d => ({...d.data(), _docId: d.id})));
      });
    },

    // Real-time listener on a single doc
    listenDoc: (col, id, cb) =>
      window.db.collection(col).doc(id).onSnapshot(snap => {
        cb(snap.exists ? {...snap.data(), _docId: snap.id} : null);
      }),

    // Timestamp
    now: () => firebase.firestore.FieldValue.serverTimestamp(),
  };

  document.getElementById("ld-status").textContent = "Loading app…";

function slotStatus(tt){
  const now=new Date(),dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][now.getDay()];
  if(tt.day!==dow||tt.cancelled) return{live:false,status:tt.cancelled?"cancelled":"other"};
  const[h,m]=tt.startTime.split(":").map(Number);
  const start=new Date(now); start.setHours(h,m,0,0);
  const end=new Date(start.getTime()+UNIT_DURATION*3600000);
  const diff=(now-start)/60000;
  if(diff<-5) return{live:false,status:"upcoming",minsUntil:Math.ceil(-diff)};
  if(now>end) return{live:false,status:"ended"};
  return{live:true,late:diff>LATE_MINS,minsIn:Math.floor(diff),status:"live"};
}

// Seed Firestore on first run (checks if data already exists)
async function seedFirestore(){
  try {
    const existing = await window.db.collection("classes").limit(1).get();
    if(!existing.empty) return; // already seeded
    const batch = window.db.batch();
    SEED_CLASSES.forEach(c  => batch.set(window.db.collection("classes").doc(c.id), c));
    SEED_STUDENTS.forEach(s => batch.set(window.db.collection("students").doc(s.id), s));
    SEED_LECTURERS.forEach(l=> batch.set(window.db.collection("lecturers").doc(l.id), l));
    SEED_UNITS.forEach(u    => batch.set(window.db.collection("units").doc(u.id), u));
    SEED_TT.forEach(t       => batch.set(window.db.collection("timetable").doc(t.id), t));
    // Seed some historical attendance records
    const start=new Date("2025-01-20"),end=new Date("2025-03-01");
    let count=0;
    for(let d=new Date(start);d<=end&&count<300;d.setDate(d.getDate()+1)){
      const dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
      if(dow==="Sun"||dow==="Sat") continue;
      const ds=d.toISOString().slice(0,10);
      SEED_TT.forEach(tt=>{
        if(tt.day!==dow) return;
        const unit=SEED_UNITS.find(u=>u.id===tt.unitId);
        const cls=SEED_CLASSES.find(c=>c.id===tt.classId);
        if(!unit||!cls) return;
        if(Math.random()<0.91){
          const lid=uid();
          batch.set(window.db.collection("lecRecs").doc(lid),{id:lid,lecturerId:unit.lecturerId,ttId:tt.id,unitId:tt.unitId,classId:tt.classId,date:ds,time:new Date(d).toISOString()});
          cls.students.forEach(sId=>{
            if(Math.random()<0.82&&count<300){
              const rid=uid();
              const late=Math.random()<0.11;
              batch.set(window.db.collection("records").doc(rid),{id:rid,studentId:sId,ttId:tt.id,unitId:tt.unitId,classId:tt.classId,date:ds,time:new Date(d).toISOString(),status:late?"late":"present",penalty:0,penaltyNote:"",synced:true});
              count++;
            }
          });
        }
      });
    }
    await batch.commit();
    console.log("Firestore seeded successfully");
  } catch(e){ console.warn("Seed skipped or failed:", e.message); }
}

  const [lecRecs,   setLecRecs]   = useState([]);
  const [notifs,    setNotifs]    = useState([]);
  const [semLocked, setSemLocked] = useState(false);
  const [reminders, setReminders] = useState([]);
  const unseenRef = useRef(new Set());

  // ── Bootstrap: seed then subscribe ───────────────────────────────────────
  useEffect(()=>{
    seedFirestore().then(()=>{
      setFbReady(true);
    });
  },[]);

  // ── Real-time Firestore listeners (set up once fbReady) ───────────────────
  useEffect(()=>{
    if(!fbReady) return;
    const unsubs=[];
    unsubs.push(window.FB.listen("classes",   docs=>setClasses(docs)));
    unsubs.push(window.FB.listen("students",  docs=>{ const m={}; docs.forEach(d=>m[d.id]=d); setStudents(m); }));
    unsubs.push(window.FB.listen("lecturers", docs=>{ const m={}; docs.forEach(d=>m[d.id]=d); setLecturers(m); }));
    unsubs.push(window.FB.listen("units",     docs=>setUnits(docs)));
    unsubs.push(window.FB.listen("timetable", docs=>setTimetable(docs)));
    unsubs.push(window.FB.listen("records",   docs=>setRecords(docs)));
    unsubs.push(window.FB.listen("lecRecs",   docs=>setLecRecs(docs)));
    unsubs.push(window.FB.listen("notifs",    docs=>{
      // Only show new ones as toast-style alerts for things that arrived after load
      docs.forEach(n=>{
        if(!unseenRef.current.has(n._docId)) unseenRef.current.add(n._docId);
      });
      setNotifs(docs.sort((a,b)=>b.time>a.time?1:-1));
    }));
    // Semester lock flag
    unsubs.push(window.FB.listenDoc("config","semester", doc=>{
      if(doc) setSemLocked(doc.locked||false);
    }));
    return()=>unsubs.forEach(u=>u());
  },[fbReady]);

  const pushNotif=useCallback((toIds,title,body,type="info")=>{
    window.FB.add("notifs",{toIds,title,body,type,time:nowISO()}).catch(()=>{});
  },[]);

  const addReminder=useCallback((ttId,mins)=>{
    setReminders(prev=>{
      if(prev.find(r=>r.ttId===ttId&&r.userId===session?.id)) return prev;
      return[...prev,{id:uid(),ttId,userId:session?.id,mins}];
    });
    if(Notification.permission==="default") Notification.requestPermission();
  },[session]);

  const removeReminder=useCallback(ttId=>{
    setReminders(prev=>prev.filter(r=>!(r.ttId===ttId&&r.userId===session?.id)));
  },[session]);

  // Reminder check every 30s
  useEffect(()=>{
    if(!session) return;
    const check=()=>{
      const now=new Date(),dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][now.getDay()];
      timetable.forEach(tt=>{
        if(tt.day!==dow||tt.cancelled) return;
        reminders.filter(r=>r.ttId===tt.id&&r.userId===session.id).forEach(r=>{
          const[h,m]=tt.startTime.split(":").map(Number);
          const start=new Date(now); start.setHours(h,m,0,0);
          const diff=(start-now)/60000;
          const key=`rem_${r.id}_${todayStr()}`;
          if(Math.abs(diff-r.mins)<0.6&&!sessionStorage.getItem(key)){
            sessionStorage.setItem(key,"1");
            const unit=units.find(u=>u.id===tt.unitId);
            if(Notification.permission==="granted") new Notification(`⏰ Class in ${r.mins} min`,{body:`${unit?.name} — ${tt.room}`});
            pushNotif([session.id],"⏰ Reminder",`${unit?.name} in ${r.mins} min — ${tt.room}`,"reminder");
          }
        });
      });
    };
    const iv=setInterval(check,30000);
    return()=>clearInterval(iv);
  },[session,timetable,reminders,units,pushNotif]);

  const login=useCallback(async(u,p)=>{
    const res=await mockMoodleLogin(u,p);
    if(!res.ok) return{ok:false};
    const sess={role:res.role,id:res.id,username:res.username,token:res.token,deviceId:getDeviceId()};
    saveSession(sess); setSession(sess);
    writeAudit(res.id,"Login",`Signed in as ${res.role} on device ${getDeviceId()}`);
    return{ok:true};
  },[]);

  const logout=useCallback(()=>{
    writeAudit(session?.id||"?","Logout","Session ended");
    clearSession(); setSession(null);
  },[session]);

  if(!fbReady) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F0F4FF"}}>
      <div style={{textAlign:"center"}}>
        <div className="spin" style={{width:36,height:36,border:"3px solid #E0E7FF",borderTop:"3px solid #2563EB",borderRadius:"50%",margin:"0 auto 12px"}}/>
        <div style={{fontSize:13,color:"#94a3b8"}}>Connecting to Firebase…</div>
      </div>
    </div>
  );

  const shared={session,logout,classes,setClasses,students,setStudents,lecturers,setLecturers,units,setUnits,timetable,setTimetable,notifs,records,setRecords,lecRecs,setLecRecs,reminders,addReminder,removeReminder,pushNotif,qrReady,semLocked,setSemLocked,writeAudit};

  if(!session) return<><style>{CSS}</style><LoginPage login={login}/></>;
  return(
    <>
      <style>{CSS}</style>
      {session.role==="student"  && <StudentApp  {...shared}/>}
      {session.role==="lecturer" && <LecturerApp {...shared}/>}
      {session.role==="admin"    && <AdminApp    {...shared}/>}
    </>
  );
}

function useScript(src,key){
  const[ready,setReady]=useState(!!window[key]);
  useEffect(()=>{
    if(window[key]){setReady(true);return;}
    const s=document.createElement("script");s.src=src;s.onload=()=>setReady(true);document.head.appendChild(s);
  },[]);
  return ready;
}

// ─── Student Scan ─────────────────────────────────────────────────────────────
function StudentScan({session,units,classes,timetable,records,students,pushNotif,qrReady,student}){
  const cls=classes.find(c=>c.id===student?.classId);
  const myUnitIds=new Set(units.filter(u=>u.active&&u.classIds?.includes(student?.classId||"")).map(u=>u.id));
  const mySlots=timetable.filter(t=>myUnitIds.has(t.unitId)&&t.classId===student?.classId);
  const liveSlots=mySlots.map(t=>({...t,_st:slotStatus(t)})).filter(t=>t._st.live);
  const upcomingSlots=mySlots.map(t=>({...t,_st:slotStatus(t)})).filter(t=>t._st.status==="upcoming").sort((a,b)=>a._st.minsUntil-b._st.minsUntil);

  const[scanning,setScanning]=useState(false);
  const[result,setResult]=useState(null);
  const[statusResult,setStatusResult]=useState(undefined);
  const[checkingStatus,setCheckingStatus]=useState(false);
  const videoRef=useRef(null);const canvasRef=useRef(null);const animRef=useRef(null);

  const doCheckIn=async(ttId,isLate)=>{
    const tt=timetable.find(t=>t.id===ttId);
    if(!tt) return{ok:false,reason:"not_found"};
    const unit=units.find(u=>u.id===tt.unitId);
    // Check if lecturer opened session
    const sessionSnap=await window.db.collection("openSessions").doc(ttId+":"+todayStr()).get();
    if(!sessionSnap.exists) return{ok:false,reason:"not_open"};
    // One scan per session
    const already=records.find(r=>r.studentId===session.id&&r.ttId===ttId&&r.date===todayStr());
    if(already) return{ok:false,reason:"already",status:already.status};
    const rec={id:uid(),studentId:session.id,ttId,unitId:tt.unitId,classId:tt.classId,date:todayStr(),time:nowISO(),status:isLate?"late":"present",penalty:0,penaltyNote:"",synced:true};
    await fbAddRecord(rec);
    // At-risk check
    const unitRecs=records.filter(r=>r.studentId===session.id&&r.unitId===tt.unitId);
    const totalSlots=timetable.filter(t=>t.unitId===tt.unitId&&t.classId===tt.classId&&!t.cancelled).length;
    const attended=unitRecs.filter(r=>r.status==="present"||r.status==="late").length+1;
    const pct=totalSlots>0?Math.round(attended/totalSlots*100):100;
    for(const w of WARN_AT){
      if(pct<=w){
        const key=`warned_${session.id}_${tt.unitId}_${w}`;
        if(!sessionStorage.getItem(key)){
          sessionStorage.setItem(key,"1");
          pushNotif([session.id,`HOD_${cls?.hodId||"H01"}`],`⚠ Attendance Warning`,`${student?.name} attendance in ${unit?.name} is ${pct}% — below ${w}% threshold.`,"warning");
        }
        break;
      }
    }
    writeAudit(session.id,"Check-in",`${isLate?"Late":"Present"} for ${unit?.name} on ${todayStr()}`);
    const bonus=bonusMark(pct);
    const std=standing(pct);
    return{ok:true,status:rec.status,unit,pct,bonus,standing:std};
  };

  const startScan=()=>{ setScanning(true); setResult(null); setTimeout(()=>{ if(!videoRef.current) return; navigator.mediaDevices?.getUserMedia({video:{facingMode:"environment"}}).then(stream=>{ videoRef.current.srcObject=stream; videoRef.current.play(); tick(); }).catch(()=>{ setScanning(false); alert("Camera access denied."); }); },200); };
  const stopScan=()=>{ if(animRef.current) cancelAnimationFrame(animRef.current); if(videoRef.current?.srcObject) videoRef.current.srcObject.getTracks().forEach(t=>t.stop()); setScanning(false); };
  const tick=()=>{
    if(!videoRef.current||!canvasRef.current) return;
    const v=videoRef.current,c=canvasRef.current,ctx=c.getContext("2d");
    if(v.readyState===v.HAVE_ENOUGH_DATA){ c.width=v.videoWidth;c.height=v.videoHeight;ctx.drawImage(v,0,0); const img=ctx.getImageData(0,0,c.width,c.height); if(window.jsQR){ const code=window.jsQR(img.data,img.width,img.height); if(code?.data?.startsWith("ATTENDEASE:CLASS:")){ const parts=code.data.split(":"); const ttId=parts[5]||""; stopScan(); if(!ttId){setResult({ok:false,reason:"invalid_qr"});return;} const tt=timetable.find(t=>t.id===ttId); if(!tt){setResult({ok:false,reason:"invalid_qr"});return;} const st=slotStatus(tt); if(!st.live){setResult({ok:false,reason:"class_closed",detail:st});return;} doCheckIn(ttId,st.late).then(r=>setResult(r)); return; } } }
    animRef.current=requestAnimationFrame(tick);
  };

  const demoScan=async(ttId)=>{
    // Open session automatically for demo
    await window.db.collection("openSessions").doc(ttId+":"+todayStr()).set({openedAt:nowISO(),lecturerId:"DEMO"});
    doCheckIn(ttId,false).then(r=>setResult(r));
  };

  const checkStatus=(ttId)=>{
    setCheckingStatus(true);
    setTimeout(()=>{
      const rec=records.find(r=>r.studentId===session.id&&r.ttId===ttId&&r.date===todayStr());
      setCheckingStatus(false);
      setStatusResult(rec||null);
    },400);
  };

  if(result) return<ScanResult result={result} student={student} onBack={()=>setResult(null)}/>;

  return(
    <div className="slide-in">
      <div style={{marginBottom:18}}>
        <h2 style={{fontWeight:800,fontSize:20}}>Scan QR Attendance</h2>
        <p style={{fontSize:13,color:"#64748b",marginTop:3}}>{cls?.code} · {student?.name}</p>
      </div>

      {liveSlots.length>0 ? liveSlots.map(tt=>{
        const unit=units.find(u=>u.id===tt.unitId);
        const alreadyIn=records.find(r=>r.studentId===session.id&&r.ttId===tt.id&&r.date===todayStr());
        return(
          <div key={tt.id} className="card" style={{borderLeft:"4px solid #DC2626",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span className="live-dot"/><span style={{fontSize:12,fontWeight:700,color:"#DC2626"}}>LIVE NOW</span>
                  {tt._st.late&&<span className="badge" style={{background:"#FEF3C7",color:"#92400E"}}>⚠ {tt._st.minsIn}min in — will be marked Late</span>}
                </div>
                <div style={{fontWeight:700,fontSize:16}}>{unit?.name}</div>
                <div style={{fontSize:12,color:"#64748b"}}>{unit?.code} · {tt.room} · until {addHrs(tt.startTime,UNIT_DURATION)}</div>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {alreadyIn
                  ?<span className="badge" style={{background:"#D1FAE5",color:"#065F46",fontSize:13,padding:"8px 14px"}}>✓ Marked {alreadyIn.status}</span>
                  :<>
                    <button className="btn btn-live" onClick={startScan}>📷 Scan QR</button>
                    <button className="btn btn-ghost btn-sm" onClick={()=>demoScan(tt.id)}>Demo scan</button>
                  </>
                }
                <button className="btn btn-outline btn-sm" onClick={()=>checkStatus(tt.id)} disabled={checkingStatus}>
                  {checkingStatus?<Spinner/>:"🔍 Check Status"}
                </button>
              </div>
            </div>
            {statusResult===null&&<div style={{marginTop:10,background:"#FEE2E2",borderRadius:10,padding:"8px 14px",fontSize:13,color:"#DC2626"}}>✗ Not yet marked for this session.</div>}
            {statusResult&&statusResult!==null&&<div style={{marginTop:10,background:"#D1FAE5",borderRadius:10,padding:"8px 14px",fontSize:13,color:"#065F46"}}>✓ Confirmed — marked <strong>{statusResult.status}</strong> at {fmtTime(statusResult.time)}</div>}
          </div>
        );
      }) : (
        <div className="card" style={{textAlign:"center",padding:"36px 24px",marginBottom:16}}>
          <div style={{fontSize:44,marginBottom:10}}>📷</div>
          <h3 style={{fontWeight:700,fontSize:17,marginBottom:6}}>No live class right now</h3>
          <p style={{color:"#64748b",fontSize:13,lineHeight:1.6,marginBottom:16}}>When a class is in session, a <span style={{color:"#DC2626",fontWeight:600}}>LIVE NOW</span> button will appear. Your lecturer must open the session first.</p>
          {upcomingSlots.length>0&&(
            <div style={{background:"#EEF2FF",borderRadius:12,padding:"12px 16px",textAlign:"left"}}>
              <div style={{fontSize:11,fontWeight:600,color:"#6B7FBD",marginBottom:8}}>NEXT UP</div>
              {upcomingSlots.slice(0,3).map(tt=>{
                const u=units.find(x=>x.id===tt.unitId);
                return<div key={tt.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #E0E7FF",fontSize:13}}><span style={{fontWeight:600}}>{u?.code}</span><span style={{color:"#64748b"}}>{tt.day} {tt.startTime} · {tt.room}</span><span style={{color:"#2563EB",fontWeight:600}}>in {tt._st.minsUntil}m</span></div>;
              })}
            </div>
          )}
        </div>
      )}

      {scanning&&(
        <div className="modal-bg">
          <div className="modal pop-in" style={{maxWidth:340,textAlign:"center"}}>
            <h3 style={{fontWeight:700,marginBottom:12}}>Point camera at classroom QR</h3>
            <div style={{position:"relative",width:"100%",aspectRatio:"1",background:"#000",borderRadius:14,overflow:"hidden"}}>
              <video ref={videoRef} style={{width:"100%",height:"100%",objectFit:"cover"}} playsInline muted/>
              <canvas ref={canvasRef} style={{display:"none"}}/>
              <div className="scan-line"/>
              <div style={{position:"absolute",inset:0,border:"2px solid rgba(37,99,235,.5)",borderRadius:14,pointerEvents:"none"}}/>
            </div>
            <button className="btn btn-red" style={{width:"100%",marginTop:14}} onClick={stopScan}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ScanResult({result,student,onBack}){
  const{ok,reason,status,unit,pct,bonus,standing:std,detail}=result;
  if(!ok){
    const msgs={not_open:"The lecturer hasn't opened this session yet. Wait for your lecturer to scan first.",already:`You are already marked as ${result.status} for this class today.`,class_closed:detail?.status==="upcoming"?`Class starts in ${detail.minsUntil} min.`:detail?.status==="ended"?"Check-in window has closed.":"Class not scheduled today.",not_found:"Invalid QR — use the printed classroom QR.",invalid_qr:"QR not recognised. Use the classroom QR."};
    return(
      <div className="card pop-in" style={{maxWidth:380,margin:"0 auto",textAlign:"center",padding:36}}>
        <div style={{fontSize:44,marginBottom:10}}>{reason==="already"?"✅":"⛔"}</div>
        <h2 style={{fontWeight:700,fontSize:17,color:reason==="already"?"#059669":"#DC2626",marginBottom:8}}>{reason==="already"?"Already Checked In":"Cannot Check In"}</h2>
        <p style={{color:"#64748b",fontSize:13,lineHeight:1.6,marginBottom:18}}>{msgs[reason]||"Something went wrong."}</p>
        <button className="btn btn-blue" style={{width:"100%"}} onClick={onBack}>← Back</button>
      </div>
    );
  }
  const isLate=status==="late";
  return(
    <div className="card pop-in" style={{maxWidth:380,margin:"0 auto",textAlign:"center",padding:36}}>
      <div style={{width:64,height:64,borderRadius:"50%",background:isLate?"linear-gradient(135deg,#D97706,#F59E0B)":"linear-gradient(135deg,#059669,#34d399)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:700,color:"#fff",margin:"0 auto 10px"}}>{student?.photo}</div>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:".1em",color:isLate?"#D97706":"#059669",marginBottom:4}}>{isLate?"⚠ LATE ARRIVAL":"✓ ATTENDANCE MARKED"}</div>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:2}}>{student?.name}</h2>
      <div style={{fontSize:13,color:"#64748b",marginBottom:2}}>{student?.adm}</div>
      <div style={{fontSize:13,fontWeight:600,color:"#2563EB",marginBottom:16}}>{unit?.name} · {fmtTime(nowISO())}</div>
      {std&&(
        <div style={{background:`${std.c}0e`,border:`1.5px solid ${std.c}28`,borderRadius:14,padding:14,marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:std.c,letterSpacing:".08em"}}>{std.i} {std.l}</div>
          <div style={{fontSize:30,fontWeight:800,color:"#0F1B35",margin:"4px 0"}}>{pct}<span style={{fontSize:16}}>%</span></div>
          <div style={{fontSize:12,color:"#64748b"}}>Semester attendance</div>
          <div style={{marginTop:8,display:"inline-block",background:"#EEF2FF",borderRadius:8,padding:"5px 14px",fontSize:13,fontWeight:700,color:"#2563EB"}}>+{bonus} bonus marks</div>
        </div>
      )}
      <div style={{fontSize:12,color:"#94a3b8",marginBottom:14}}>✓ Synced to Firebase</div>
      <button className="btn btn-ghost" style={{width:"100%"}} onClick={onBack}>← Done</button>
    </div>
  );
}

// ─── Student Timetable ────────────────────────────────────────────────────────
function StudentTimetable({session,units,timetable,records,reminders,addReminder,removeReminder,student,goToScan}){
  const myUnitIds=new Set(units.filter(u=>u.active&&u.classIds?.includes(student?.classId||"")).map(u=>u.id));
  const mySlots=timetable.filter(t=>myUnitIds.has(t.unitId)&&t.classId===student?.classId);
  const[selDay,setSelDay]=useState(todayDow()||"Mon");
  const[reminderModal,setReminderModal]=useState(null);
  const daySlots=mySlots.filter(t=>t.day===selDay).sort((a,b)=>a.startTime.localeCompare(b.startTime));
  return(
    <div className="slide-in">
      <h2 style={{fontWeight:800,fontSize:20,marginBottom:16}}>My Timetable</h2>
      <div style={{display:"flex",gap:6,marginBottom:18,overflowX:"auto",paddingBottom:4}}>
        {DAYS.map(d=>{
          const hasLive=mySlots.some(t=>t.day===d&&slotStatus(t).live);
          return<button key={d} onClick={()=>setSelDay(d)} style={{border:"none",borderRadius:10,padding:"9px 18px",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:600,flexShrink:0,background:selDay===d?"#0a0f2e":"#fff",color:selDay===d?"#fff":hasLive?"#DC2626":"#64748b",boxShadow:selDay===d?"0 4px 12px rgba(0,0,0,.2)":"0 1px 4px rgba(0,0,0,.06)",position:"relative"}}>{d}{d===todayDow()&&<span style={{position:"absolute",top:3,right:3,width:6,height:6,borderRadius:"50%",background:hasLive?"#DC2626":"#2563EB"}}/>}</button>;
        })}
      </div>
      {daySlots.length===0?<div className="card" style={{textAlign:"center",padding:36,color:"#94a3b8"}}>No classes on {selDay}.</div>
      :daySlots.map(tt=>{
        const unit=units.find(u=>u.id===tt.unitId);
        const st=slotStatus(tt);
        const col=unitColor(tt.unitId);
        const hasRem=reminders.some(r=>r.ttId===tt.id&&r.userId===session.id);
        const todayRec=records.find(r=>r.studentId===session.id&&r.ttId===tt.id&&r.date===todayStr());
        return(
          <div key={tt.id} className="card" style={{marginBottom:12,borderLeft:`4px solid ${tt.isMakeup?"#059669":tt.cancelled?"#DC2626":col}`,opacity:tt.cancelled?.7:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:col,fontWeight:700}}>{unit?.code}</span>
                  {tt.isMakeup&&<span className="badge" style={{background:"#D1FAE5",color:"#065F46"}}>🔄 Make-up</span>}
                  {tt.cancelled&&<span className="badge" style={{background:"#FEE2E2",color:"#DC2626"}}>❌ Cancelled</span>}
                  {st.live&&<span className="badge" style={{background:"#FEE2E2",color:"#DC2626"}}>🔴 LIVE</span>}
                  {st.status==="upcoming"&&selDay===todayDow()&&<span className="badge" style={{background:"#EEF2FF",color:"#2563EB"}}>in {st.minsUntil}m</span>}
                </div>
                <div style={{fontWeight:700,fontSize:15}}>{unit?.name}</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{tt.startTime}–{addHrs(tt.startTime,UNIT_DURATION)} · {tt.room} · {tt.type}</div>
                {todayRec&&<div style={{fontSize:12,color:"#059669",marginTop:3,fontWeight:600}}>✓ {todayRec.status==="late"?"Late":"Present"} at {fmtTime(todayRec.time)}</div>}
              </div>
              <div style={{display:"flex",gap:8}}>
                {st.live&&!todayRec&&<button className="btn btn-live btn-sm" onClick={goToScan}>📷 Scan Now</button>}
                {!tt.cancelled&&<button onClick={()=>setReminderModal(tt)} style={{background:"none",border:"1.5px solid #E0E7FF",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:16,color:hasRem?"#D97706":"#94a3b8"}}>{hasRem?"🔔":"🔕"}</button>}
              </div>
            </div>
          </div>
        );
      })}
      {reminderModal&&(
        <div className="modal-bg" onClick={()=>setReminderModal(null)}>
          <div className="modal pop-in" style={{maxWidth:320,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:34,marginBottom:8}}>⏰</div>
            <h3 style={{fontWeight:700,fontSize:16,marginBottom:14}}>{units.find(u=>u.id===reminderModal.unitId)?.name}</h3>
            <p style={{fontSize:13,color:"#64748b",marginBottom:12}}>Remind me before this class:</p>
            {[5,10,15,30,60].map(m=><button key={m} className="btn btn-ghost" style={{width:"100%",marginBottom:8,justifyContent:"center"}} onClick={()=>{addReminder(reminderModal.id,m);setReminderModal(null);}}>⏰ {m} minutes before</button>)}
            {reminders.some(r=>r.ttId===reminderModal.id&&r.userId===session.id)&&<button className="btn btn-red" style={{width:"100%",marginBottom:8}} onClick={()=>{removeReminder(reminderModal.id);setReminderModal(null);}}>🔕 Remove Reminder</button>}
            <button className="btn btn-outline" style={{width:"100%"}} onClick={()=>setReminderModal(null)}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Student Attendance ───────────────────────────────────────────────────────
function StudentAttendance({session,units,timetable,records,student}){
  const myUnits=units.filter(u=>u.active&&u.classIds?.includes(student?.classId||""));
  const[sel,setSel]=useState(null);
  const getStats=unitId=>{
    const slots=timetable.filter(t=>t.unitId===unitId&&t.classId===student?.classId&&!t.cancelled);
    const today=new Date(),start=new Date("2025-01-20");
    let total=0;
    slots.forEach(tt=>{for(let d=new Date(start);d<=today;d.setDate(d.getDate()+1)){if(["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()]===tt.day)total++;}});
    const recs=records.filter(r=>r.studentId===session.id&&r.unitId===unitId);
    const attended=recs.filter(r=>r.status==="present"||r.status==="late").length;
    const lateCount=recs.filter(r=>r.status==="late").length;
    const pct=total>0?Math.round(attended/total*100):0;
    const bonus=bonusMark(pct);
    const penalties=recs.reduce((a,r)=>a+((r.penalty||0)*(r.penaltyForgiven?0:1)),0);
    const net=Math.max(0,bonus-penalties);
    const remaining=slots.length*2;
    const projectedPct=Math.round((attended+remaining)/Math.max(total+remaining,1)*100);
    return{total,attended,absent:total-attended,lateCount,pct,bonus,penalties,net,projectedPct,std:standing(pct)};
  };
  const allStats=myUnits.map(u=>({u,st:getStats(u.id)}));
  const avgPct=allStats.length?Math.round(allStats.reduce((a,x)=>a+x.st.pct,0)/allStats.length):0;
  const totalNet=allStats.reduce((a,x)=>a+x.st.net,0);
  return(
    <div className="slide-in">
      <h2 style={{fontWeight:800,fontSize:20,marginBottom:16}}>My Attendance</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:18}}>
        {[["Overall",`${avgPct}%`,"#2563EB"],["Net Marks",`+${totalNet}`,"#059669"],["Units",myUnits.length,"#F59E0B"]].map(([l,v,c])=>(
          <div key={l} className="card" style={{textAlign:"center",borderTop:`3px solid ${c}`}}>
            <div style={{fontSize:26,fontWeight:800,color:c}}>{v}</div>
            <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
      {allStats.map(({u,st})=>(
        <div key={u.id} className="card" style={{marginBottom:12,cursor:"pointer",border:sel===u.id?"2px solid #2563EB":"2px solid transparent"}} onClick={()=>setSel(sel===u.id?null:u.id)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontWeight:700,fontSize:15}}>{u.name}</div><div style={{fontSize:12,color:"#64748b"}}>{u.code}</div></div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:22,fontWeight:800,color:st.pct>=75?"#059669":st.pct>=60?"#F59E0B":"#DC2626"}}>{st.pct}%</div>
              <div style={{fontSize:12,color:"#2563EB",fontWeight:600}}>net +{st.net}</div>
            </div>
          </div>
          {sel===u.id&&(
            <div className="slide-in" style={{marginTop:14}}>
              <div style={{height:6,background:"#EEF2FF",borderRadius:99,overflow:"hidden",marginBottom:12}}><div style={{width:`${st.pct}%`,height:"100%",background:st.pct>=75?"#059669":st.pct>=60?"#F59E0B":"#DC2626",borderRadius:99,transition:"width .6s"}}/></div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
                {[["Present",st.attended,"#059669"],["Late",st.lateCount,"#D97706"],["Absent",st.absent,"#DC2626"]].map(([l,v,c])=>(
                  <div key={l} className="card-sm" style={{textAlign:"center",padding:"8px 4px"}}><div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>{l}</div></div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
                {[["Bonus",`+${st.bonus}`,"#2563EB"],["Penalty",`-${st.penalties}`,"#DC2626"],["Net",`+${st.net}`,"#059669"]].map(([l,v,c])=>(
                  <div key={l} className="card-sm" style={{textAlign:"center",padding:"8px 4px",background:`${c}08`}}><div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>{l}</div></div>
                ))}
              </div>
              <div style={{padding:"9px 14px",borderRadius:10,background:`${st.std.c}0e`,border:`1px solid ${st.std.c}22`}}>
                <div style={{fontWeight:600,color:st.std.c,fontSize:13}}>{st.std.i} {st.std.l}</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Projected end-of-semester: <strong>{st.projectedPct}%</strong> if all remaining classes attended</div>
              </div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

  return(
    <Shell {...props} navItems={navItems} activeTab={tab} setActiveTab={setTab} accent="#059669">
      <div style={{background:"linear-gradient(120deg,#0a0f2e,#1e3a8a)",borderRadius:16,padding:"14px 20px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{color:"rgba(255,255,255,.5)",fontSize:11,letterSpacing:".08em"}}>MY DELIVERY THIS SEMESTER</div>
          <div style={{color:"#fff",fontWeight:700,fontSize:14,marginTop:2}}>{lecturers[session.id]?.name}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:28,fontWeight:800,color:lecPct>=80?"#34d399":"#F59E0B"}}>{lecPct}%</div><div style={{fontSize:11,color:"rgba(255,255,255,.45)"}}>Delivered</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,color:"#fff"}}>{myLecRecs.length}/{mySlots.length}</div><div style={{fontSize:11,color:"rgba(255,255,255,.45)"}}>Sessions</div></div>
        </div>
      </div>
      {tab==="scan"      && <LecturerScan     {...props} myUnits={myUnits}/>}
      {tab==="register"  && <LecturerRegister {...props} myUnits={myUnits}/>}
      {tab==="timetable" && <TimetableManager {...props} myUnits={myUnits} isAdmin={false}/>}
      {tab==="units"     && <UnitManager      {...props} myUnits={myUnits} isAdmin={false}/>}
      {tab==="penalties" && <PenaltyManager   {...props} myUnits={myUnits}/>}
      {tab==="qr"        && <LecturerQR       {...props} myUnits={myUnits}/>}
      {tab==="notifs"    && <NotifList notifs={myNotifs}/>}
    </Shell>
  );
}

// ─── Lecturer: Open Session ───────────────────────────────────────────────────
function LecturerScan({session,units,timetable,lecRecs,setLecRecs,myUnits}){
  const liveSlots=timetable.filter(t=>myUnits.some(u=>u.id===t.unitId)).map(t=>({...t,_st:slotStatus(t)})).filter(t=>t._st.live);
  const[opening,setOpening]=useState(null);
  const[openedToday,setOpenedToday]=useState({});

  // Listen to openSessions in real time
  useEffect(()=>{
    const unsub=window.FB.listen("openSessions", docs=>{
      const m={};
      docs.filter(d=>d.date===todayStr()).forEach(d=>m[d.ttId]=true);
      setOpenedToday(m);
    });
    return()=>unsub();
  },[]);

  const openSession=async(tt)=>{
    setOpening(tt.id);
    const unit=units.find(u=>u.id===tt.unitId);
    const already=lecRecs.find(r=>r.lecturerId===session.id&&r.ttId===tt.id&&r.date===todayStr());
    // Write to openSessions so students can check in
    await window.db.collection("openSessions").doc(tt.id+":"+todayStr()).set({ttId:tt.id,date:todayStr(),lecturerId:session.id,openedAt:nowISO()});
    // Write lecturer attendance record
    if(!already){
      const rec={id:uid(),lecturerId:session.id,ttId:tt.id,unitId:tt.unitId,classId:tt.classId,date:todayStr(),time:nowISO()};
      await fbAddLecRec(rec);
      writeAudit(session.id,"Session open",`Opened ${unit?.name} for ${todayStr()}`);
    }
    setOpening(null);
  };

  return(
    <div className="slide-in">
      <h2 style={{fontWeight:700,fontSize:18,marginBottom:6}}>Open Attendance Session</h2>
      <p style={{fontSize:13,color:"#64748b",marginBottom:18}}>Students cannot check in until you open the session. The class rep scans the QR — or tap below.</p>
      {liveSlots.length===0
        ?<div className="card" style={{textAlign:"center",padding:40,color:"#94a3b8"}}><div style={{fontSize:40,marginBottom:10}}>📋</div><div style={{fontWeight:600}}>No live classes right now.</div></div>
        :liveSlots.map(tt=>{
          const unit=units.find(u=>u.id===tt.unitId);
          const isOpen=openedToday[tt.id];
          return(
            <div key={tt.id} className="card" style={{marginBottom:12,borderLeft:"4px solid #059669"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                <div>
                  <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}><span className="live-dot"/><span style={{fontSize:12,fontWeight:700,color:"#DC2626"}}>LIVE NOW</span></div>
                  <div style={{fontWeight:700,fontSize:16}}>{unit?.name}</div>
                  <div style={{fontSize:12,color:"#64748b"}}>{unit?.code} · {tt.room} · {tt.startTime}–{addHrs(tt.startTime,UNIT_DURATION)}</div>
                </div>
                {isOpen
                  ?<div style={{background:"#D1FAE5",borderRadius:12,padding:"10px 16px",textAlign:"center"}}><div style={{fontSize:12,fontWeight:700,color:"#065F46"}}>✓ Session Open</div><div style={{fontSize:11,color:"#065F46",marginTop:2}}>Students can now scan</div></div>
                  :<button className="btn btn-green" onClick={()=>openSession(tt)} disabled={opening===tt.id}>{opening===tt.id?<><Spinner/>Opening…</>:"📋 Open Session"}</button>
                }
              </div>
            </div>
          );
        })
      }
      <div style={{background:"#F0FDF4",borderRadius:12,padding:"12px 16px",marginTop:8,fontSize:13,color:"#065F46",border:"1px solid #BBF7D0"}}>
        💡 The printed class QR is kept by your class representative. When they scan it, it opens the session automatically. You can also open it manually here.
      </div>
    </div>
  );
}

// ─── Lecturer: Register ───────────────────────────────────────────────────────
function LecturerRegister({session,units,classes,timetable,records,students,myUnits,pushNotif,semLocked}){
  const[selUnit,setSelUnit]=useState(myUnits[0]?.id||"");
  const unit=units.find(u=>u.id===selUnit);
  const unitClasses=classes.filter(c=>unit?.classIds?.includes(c.id));
  const[selClass,setSelClass]=useState(unitClasses[0]?.id||"");
  const cls=classes.find(c=>c.id===selClass);
  const enrolled=(cls?.students||[]).map(id=>students[id]).filter(Boolean).filter(s=>s.status!=="deferred");
  const todayRecs=records.filter(r=>r.unitId===selUnit&&r.classId===selClass&&r.date===todayStr());
  const presentIds=new Set(todayRecs.map(r=>r.studentId));

  const mark=async(studentId,status)=>{
    if(semLocked) return;
    if(records.find(r=>r.studentId===studentId&&r.unitId===selUnit&&r.classId===selClass&&r.date===todayStr())) return;
    const rec={id:uid(),studentId,ttId:"MANUAL",unitId:selUnit,classId:selClass,date:todayStr(),time:nowISO(),status,penalty:0,penaltyNote:"",synced:true};
    await fbAddRecord(rec);
    writeAudit(session.id,"Manual mark",`${students[studentId]?.name} → ${status} in ${unit?.code}`);
  };

  const getStats=studentId=>{
    const recs=records.filter(r=>r.studentId===studentId&&r.unitId===selUnit);
    const attended=recs.filter(r=>r.status==="present"||r.status==="late").length;
    const lateCount=recs.filter(r=>r.status==="late").length;
    const pct=Math.round(attended/Math.max(20,1)*100);
    const bonus=bonusMark(pct);
    const penalty=recs.reduce((a,r)=>a+((r.penalty||0)*(r.penaltyForgiven?0:1)),0);
    return{attended,lateCount,absent:20-attended,pct,bonus,penalty,net:Math.max(0,bonus-penalty)};
  };

  const exportCSV=()=>{
    const rows=[["Name","Adm No","Attended","Late","Absent","Rate%","Bonus","Penalty","Net","Standing"]];
    enrolled.forEach(s=>{const st=getStats(s.id);rows.push([s.name,s.adm,st.attended,st.lateCount,st.absent,st.pct,st.bonus,st.penalty,st.net,standing(st.pct).l]);});
    if(semLocked) rows.push(["---","SEMESTER LOCKED"]);
    const csv=rows.map(r=>r.join(",")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download=`${unit?.code}_${selClass}_Attendance.csv`;a.click();
    writeAudit(session.id,"CSV Export",`${unit?.code} — ${cls?.code}`);
  };

  return(
    <div className="slide-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <h2 style={{fontWeight:700,fontSize:18}}>Attendance Register <span style={{fontSize:11,color:"#34d399",fontWeight:600,background:"rgba(52,211,153,.1)",borderRadius:20,padding:"2px 8px"}}>● Live</span></h2>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <select className="input" style={{width:"auto",fontSize:12}} value={selUnit} onChange={e=>setSelUnit(e.target.value)}>{myUnits.map(u=><option key={u.id} value={u.id}>{u.code}</option>)}</select>
          <select className="input" style={{width:"auto",fontSize:12}} value={selClass} onChange={e=>setSelClass(e.target.value)}>{unitClasses.map(c=><option key={c.id} value={c.id}>{c.code}</option>)}</select>
          <button className="btn btn-green btn-sm" onClick={exportCSV}>📥 Export CSV</button>
        </div>
      </div>
      {semLocked&&<div style={{background:"#FEE2E2",borderRadius:10,padding:"9px 14px",fontSize:13,color:"#DC2626",marginBottom:12,fontWeight:600}}>🔒 Semester locked — export only.</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {[["Present",presentIds.size,"#059669"],["Absent",enrolled.length-presentIds.size,"#DC2626"],["Total",enrolled.length,"#2563EB"],["Today",todayStr().slice(5),"#64748b"]].map(([l,v,c])=>(
          <div key={l} className="card-sm" style={{textAlign:"center",borderTop:`3px solid ${c}`}}><div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{l}</div></div>
        ))}
      </div>
      <div className="card" style={{overflowX:"auto"}}>
        <table>
          <thead><tr><th>Student</th><th>Adm No</th><th>Time In</th><th>Status</th><th>%</th><th>Bonus</th>{!semLocked&&<th>Mark</th>}</tr></thead>
          <tbody>
            {enrolled.map(s=>{
              const rec=todayRecs.find(r=>r.studentId===s.id);
              const st=getStats(s.id);
              return(
                <tr key={s.id}>
                  <td><div style={{display:"flex",alignItems:"center",gap:8}}><Av i={s.photo} size={28}/><span style={{fontWeight:600}}>{s.name}</span></div></td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#6B7FBD"}}>{s.adm}</td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>{fmtTime(rec?.time)}</td>
                  <td>{rec?<span className="badge" style={{background:rec.status==="late"?"#FEF3C7":"#D1FAE5",color:rec.status==="late"?"#92400E":"#065F46"}}>{rec.status==="late"?"⚠ Late":"✓ Present"}</span>:<span className="badge" style={{background:"#FEE2E2",color:"#DC2626"}}>✗ Absent</span>}</td>
                  <td><Barpct pct={st.pct}/></td>
                  <td style={{fontWeight:700,color:"#2563EB"}}>+{st.bonus}</td>
                  {!semLocked&&<td><div style={{display:"flex",gap:5}}>{!rec&&<><button className="btn btn-green btn-sm" onClick={()=>mark(s.id,"present")}>Present</button><button className="btn btn-amber btn-sm" onClick={()=>mark(s.id,"late")}>Late</button></>}</div></td>}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Timetable Manager ────────────────────────────────────────────────────────
function TimetableManager({session,units,classes,timetable,pushNotif,myUnits,isAdmin,semLocked}){
  const visibleUnits=myUnits||units.filter(u=>u.active);
  const visibleTT=timetable.filter(t=>visibleUnits.some(u=>u.id===t.unitId));
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({});
  const[editing,setEditing]=useState(null);
  const[selDay,setSelDay]=useState(todayDow()||"Mon");
  const daySlots=visibleTT.filter(t=>t.day===selDay).sort((a,b)=>a.startTime.localeCompare(b.startTime));

  const save=async()=>{
    if(!form.unitId||!form.day||!form.startTime||!form.room) return;
    const unit=units.find(u=>u.id===form.unitId);
    const entry={...form,cancelled:false};
    if(editing){
      const old=timetable.find(t=>t.id===editing.id);
      await fbSetTT(editing.id,{...old,...entry});
      if(old.day!==entry.day||old.startTime!==entry.startTime||old.room!==entry.room){
        const affectedStudents=classes.find(c=>c.id===entry.classId)?.students||[];
        pushNotif([...affectedStudents],`📅 Rescheduled`,`${unit?.name} moved to ${entry.day} ${entry.startTime} in ${entry.room}.`,"reschedule");
        writeAudit(session.id,"Reschedule",`${unit?.code} → ${entry.day} ${entry.startTime}`);
      }
    } else {
      const id=uid();
      await fbSetTT(id,{...entry,id,cancelledDates:[]});
      writeAudit(session.id,"Add slot",`${unit?.code} ${entry.day} ${entry.startTime}`);
    }
    setModal(null);
  };

  const cancelSlot=async()=>{
    const tt=timetable.find(t=>t.id===form.id);
    const unit=units.find(u=>u.id===tt?.unitId);
    const affectedStudents=classes.find(c=>c.id===tt?.classId)?.students||[];
    await fbSetTT(form.id,{...tt,cancelled:true,cancelReason:form.cancelReason||""});
    pushNotif([...affectedStudents],`❌ Cancelled`,`${unit?.name} on ${tt?.day} ${tt?.startTime} cancelled. ${form.cancelReason||""}`.trim(),"reschedule");
    const unitCancels=timetable.filter(t=>t.unitId===tt?.unitId&&t.classId===tt?.classId&&t.cancelled).length+1;
    const makeups=timetable.filter(t=>t.unitId===tt?.unitId&&t.isMakeup).length;
    if(unitCancels-makeups>=MAX_CANCELS){
      pushNotif(["ADMIN"],`⚠ ${MAX_CANCELS}+ Cancellations`,`${unit?.name} has ${unitCancels} cancellations, only ${makeups} make-ups.`,"warning");
    }
    writeAudit(session.id,"Cancel class",`${unit?.code} ${tt?.day} ${tt?.startTime}`);
    setModal(null);
  };

  const addMakeup=async()=>{
    if(!form.day||!form.startTime||!form.room) return;
    const unit=units.find(u=>u.id===form.unitId);
    const affectedStudents=classes.find(c=>c.id===form.classId)?.students||[];
    const id=uid();
    await fbSetTT(id,{...form,id,isMakeup:true,cancelled:false,cancelledDates:[]});
    pushNotif([...affectedStudents],`🔄 Make-up Added`,`${unit?.name} make-up on ${form.day} ${form.startTime} in ${form.room}.`,"info");
    writeAudit(session.id,"Makeup class",`${unit?.code} ${form.day} ${form.startTime}`);
    setModal(null);
  };

  const deleteSlot=async(id)=>{
    if(!window.confirm("Remove this slot?")) return;
    await fbDelTT(id);
    writeAudit(session.id,"Delete slot","Slot removed");
  };

  return(
    <div className="slide-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontWeight:700,fontSize:18}}>Timetable Manager</h2>
        {!semLocked&&<button className="btn btn-blue btn-sm" onClick={()=>{setForm({unitId:visibleUnits[0]?.id||"",classId:"",day:"Mon",startTime:"08:00",room:"",type:"lecture",semester:"Sem 2 2025",isMakeup:false});setEditing(null);setModal("form");}}>+ Add Slot</button>}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        {DAYS.map(d=>{const hasLive=visibleTT.some(t=>t.day===d&&slotStatus(t).live);return<button key={d} onClick={()=>setSelDay(d)} style={{border:"none",borderRadius:10,padding:"9px 18px",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:600,flexShrink:0,background:selDay===d?"#0a0f2e":"#fff",color:selDay===d?"#fff":hasLive?"#DC2626":"#64748b",boxShadow:selDay===d?"0 4px 12px rgba(0,0,0,.15)":"0 1px 4px rgba(0,0,0,.06)"}}>{d}{d===todayDow()&&<span style={{marginLeft:4,fontSize:10,opacity:.5}}>today</span>}</button>;})}
      </div>
      {daySlots.length===0?<div className="card" style={{textAlign:"center",padding:32,color:"#94a3b8"}}>No classes on {selDay}.</div>
      :daySlots.map(tt=>{
        const unit=units.find(u=>u.id===tt.unitId);
        const col=unitColor(tt.unitId);
        const st=slotStatus(tt);
        const cls=classes.find(c=>c.id===tt.classId);
        return(
          <div key={tt.id} className="card" style={{marginBottom:10,borderLeft:`4px solid ${tt.isMakeup?"#059669":tt.cancelled?"#DC2626":col}`,opacity:tt.cancelled?.65:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:col,fontWeight:700}}>{unit?.code}</span>
                  <span className="badge" style={{background:"#EEF2FF",color:"#4338CA",fontSize:10}}>{cls?.code}</span>
                  {tt.isMakeup&&<span className="badge" style={{background:"#D1FAE5",color:"#065F46"}}>🔄 Make-up</span>}
                  {tt.cancelled&&<span className="badge" style={{background:"#FEE2E2",color:"#DC2626"}}>❌ Cancelled</span>}
                  {st.live&&<span className="badge" style={{background:"#FEE2E2",color:"#DC2626"}}>🔴 LIVE</span>}
                </div>
                <div style={{fontWeight:700,fontSize:15}}>{unit?.name}</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{tt.startTime}–{addHrs(tt.startTime,UNIT_DURATION)} · {tt.room} · {tt.type}</div>
                {tt.cancelReason&&<div style={{fontSize:12,color:"#DC2626",marginTop:2}}>Reason: {tt.cancelReason}</div>}
              </div>
              {!semLocked&&!tt.cancelled&&(
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>{setForm({...tt});setEditing(tt);setModal("form");}}>✏ Edit</button>
                  <button className="btn btn-amber btn-sm" onClick={()=>{setForm({...tt,cancelReason:""});setModal("cancel");}}>❌ Cancel</button>
                  <button className="btn btn-green btn-sm" onClick={()=>{setForm({ttId:tt.id,unitId:tt.unitId,classId:tt.classId,day:"Mon",startTime:"08:00",room:tt.room,type:tt.type,semester:tt.semester,isMakeup:true});setEditing(null);setModal("makeup");}}>🔄 Makeup</button>
                  <button className="btn btn-sm" style={{background:"#FEE2E2",color:"#DC2626"}} onClick={()=>deleteSlot(tt.id)}>🗑</button>
                </div>
              )}
            </div>
          </div>
        );
      })}

      {(modal==="form"||modal==="makeup")&&(
        <div className="modal-bg" onClick={()=>setModal(null)}>
          <div className="modal pop-in" onClick={e=>e.stopPropagation()}>
            <h3 style={{fontWeight:700,fontSize:17,marginBottom:18}}>{modal==="makeup"?"Add Make-up":editing?"Edit Slot":"Add Slot"}</h3>
            <Fld label="UNIT"><select className="input" value={form.unitId||""} onChange={e=>setForm(f=>({...f,unitId:e.target.value}))}>{visibleUnits.map(u=><option key={u.id} value={u.id}>{u.code} — {u.name}</option>)}</select></Fld>
            <Fld label="CLASS"><select className="input" value={form.classId||""} onChange={e=>setForm(f=>({...f,classId:e.target.value}))}><option value="">-- Select class --</option>{classes.filter(c=>{const u=units.find(x=>x.id===form.unitId);return u?.classIds?.includes(c.id);}).map(c=><option key={c.id} value={c.id}>{c.code}</option>)}</select></Fld>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Fld label="DAY"><select className="input" value={form.day||"Mon"} onChange={e=>setForm(f=>({...f,day:e.target.value}))}>{DAYS.map(d=><option key={d}>{d}</option>)}</select></Fld>
              <Fld label="START TIME"><select className="input" value={form.startTime||"08:00"} onChange={e=>setForm(f=>({...f,startTime:e.target.value}))}>{TIMES.map(t=><option key={t}>{t}</option>)}</select></Fld>
            </div>
            <Fld label="END (auto)"><input className="input" value={addHrs(form.startTime||"08:00",UNIT_DURATION)} disabled style={{background:"#F0F4FF",color:"#94a3b8"}}/></Fld>
            <Fld label="ROOM"><input className="input" placeholder="e.g. B-12" value={form.room||""} onChange={e=>setForm(f=>({...f,room:e.target.value}))}/></Fld>
            <Fld label="TYPE"><select className="input" value={form.type||"lecture"} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>{["lecture","practical","tutorial","CAT"].map(t=><option key={t}>{t}</option>)}</select></Fld>
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button className="btn btn-blue" style={{flex:1}} onClick={modal==="makeup"?addMakeup:save}>Save</button>
              <button className="btn btn-outline" onClick={()=>setModal(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {modal==="cancel"&&(
        <div className="modal-bg" onClick={()=>setModal(null)}>
          <div className="modal pop-in" onClick={e=>e.stopPropagation()}>
            <h3 style={{fontWeight:700,fontSize:17,marginBottom:8}}>Cancel Class</h3>
            <p style={{fontSize:13,color:"#64748b",marginBottom:14}}>All enrolled students will be notified instantly.</p>
            <Fld label="REASON"><textarea className="input" placeholder="e.g. Public holiday, lecturer unavailable…" value={form.cancelReason||""} onChange={e=>setForm(f=>({...f,cancelReason:e.target.value}))}/></Fld>
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button className="btn btn-red" style={{flex:1}} onClick={cancelSlot}>Confirm Cancel</button>
              <button className="btn btn-outline" onClick={()=>setModal(null)}>Back</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Unit Manager ─────────────────────────────────────────────────────────────
function UnitManager({session,units,classes,myUnits,isAdmin,lecturers}){
  const visible=isAdmin?units:myUnits;
  const[modal,setModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[form,setForm]=useState({});

  const save=async()=>{
    if(!form.name||!form.code) return;
    if(editing){ await window.FB.set("units",editing.id,{...editing,...form},true); writeAudit(session.id,"Edit unit",form.code); }
    else { const id=uid(); await window.FB.set("units",id,{...form,id}); writeAudit(session.id,"Add unit",form.code); }
    setModal(false);
  };

  const toggleActive=async(u)=>{
    await window.FB.set("units",u.id,{...u,active:!u.active},true);
    writeAudit(session.id,u.active?"Suspend unit":"Reinstate unit",u.code);

            <Fld label="UNIT NAME"><input className="input" placeholder="e.g. Engineering Mathematics III" value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Fld>
            <Fld label="UNIT CODE"><input className="input" placeholder="e.g. MAT 301" value={form.code||""} onChange={e=>setForm(f=>({...f,code:e.target.value}))}/></Fld>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Fld label="CREDIT HOURS"><select className="input" value={form.creditHours||3} onChange={e=>setForm(f=>({...f,creditHours:Number(e.target.value)}))}>{[1,2,3,4,5].map(n=><option key={n}>{n}</option>)}</select></Fld>
              {isAdmin&&<Fld label="LECTURER"><select className="input" value={form.lecturerId||"L01"} onChange={e=>setForm(f=>({...f,lecturerId:e.target.value}))}>{Object.values(lecturers).map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</select></Fld>}

      )}
    </div>
  );
}

// ─── Penalty Manager ──────────────────────────────────────────────────────────
function PenaltyManager({session,units,classes,records,students,myUnits,pushNotif,semLocked,lecturers}){
  const[selUnit,setSelUnit]=useState(myUnits[0]?.id||"");
  const unit=units.find(u=>u.id===selUnit);
  const unitClasses=classes.filter(c=>unit?.classIds?.includes(c.id));
  const[selClass,setSelClass]=useState(unitClasses[0]?.id||"");
  const cls=classes.find(c=>c.id===selClass);
  const enrolled=(cls?.students||[]).map(id=>students[id]).filter(Boolean);
  const[penaltyModal,setPenaltyModal]=useState(null);
  const[penaltyForm,setPenaltyForm]=useState({pts:0,note:"",forgiven:false});

  const getPenalty=sId=>records.filter(r=>r.studentId===sId&&r.unitId===selUnit).reduce((a,r)=>a+((r.penalty||0)*(r.penaltyForgiven?0:1)),0);
  const getBonus=sId=>{ const recs=records.filter(r=>r.studentId===sId&&r.unitId===selUnit); const attended=recs.filter(r=>r.status==="present"||r.status==="late").length; return bonusMark(Math.round(attended/20*100)); };

  const applyPenalty=async()=>{
    if(!penaltyModal||semLocked) return;
    const pts=Math.min(10,Math.max(0,Number(penaltyForm.pts)));
    const rec={id:uid(),studentId:penaltyModal.id,ttId:"PENALTY",unitId:selUnit,classId:selClass,date:todayStr(),time:nowISO(),status:"penalty",penalty:pts,penaltyNote:penaltyForm.note,penaltyForgiven:penaltyForm.forgiven,synced:true};
    await fbAddRecord(rec);
    pushNotif([penaltyModal.id],penaltyForm.forgiven?"✅ Penalty Forgiven":`⚖ Penalty Applied`,penaltyForm.forgiven?`Your penalty in ${unit?.name} was forgiven by ${lecturers[session.id]?.name}.`:`A -${pts} penalty was applied in ${unit?.name}. Reason: ${penaltyForm.note||"Not specified"}.`,"penalty");
    writeAudit(session.id,penaltyForm.forgiven?"Forgive penalty":"Apply penalty",`${penaltyModal.name} in ${unit?.code}: ${penaltyForm.forgiven?"forgiven":"−"+pts}`);
    setPenaltyModal(null);
  };

  return(
    <div className="slide-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div><h2 style={{fontWeight:700,fontSize:18}}>Penalties & Marks</h2><p style={{fontSize:13,color:"#64748b",marginTop:2}}>Students are notified instantly via Firebase.</p></div>
        <div style={{display:"flex",gap:8}}>
          <select className="input" style={{width:"auto",fontSize:12}} value={selUnit} onChange={e=>setSelUnit(e.target.value)}>{myUnits.map(u=><option key={u.id} value={u.id}>{u.code}</option>)}</select>
          <select className="input" style={{width:"auto",fontSize:12}} value={selClass} onChange={e=>setSelClass(e.target.value)}>{unitClasses.map(c=><option key={c.id} value={c.id}>{c.code}</option>)}</select>
        </div>
      </div>
      {semLocked&&<div style={{background:"#FEE2E2",borderRadius:10,padding:"9px 14px",fontSize:13,color:"#DC2626",marginBottom:12,fontWeight:600}}>🔒 Semester locked.</div>}
      <div className="card" style={{overflowX:"auto"}}>
        <table>
          <thead><tr><th>Student</th><th>Bonus</th><th>Penalty</th><th>Net</th><th>Action</th></tr></thead>
          <tbody>
            {enrolled.map(s=>{
              const penalty=getPenalty(s.id);const bonus=getBonus(s.id);const net=Math.max(0,bonus-penalty);
              return(
                <tr key={s.id}>
                  <td><div style={{display:"flex",alignItems:"center",gap:8}}><Av i={s.photo} size={28}/><span style={{fontWeight:600}}>{s.name}</span></div></td>
                  <td style={{fontWeight:700,color:"#2563EB"}}>+{bonus}</td>
                  <td style={{fontWeight:700,color:penalty>0?"#DC2626":"#94a3b8"}}>{penalty>0?`−${penalty}`:"—"}</td>
                  <td style={{fontWeight:800,color:net>0?"#059669":"#DC2626"}}>+{net}</td>
                  <td>{!semLocked&&<button className="btn btn-ghost btn-sm" onClick={()=>{setPenaltyModal(s);setPenaltyForm({pts:penalty||0,note:"",forgiven:false});}}>⚖ Manage</button>}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {penaltyModal&&(
        <div className="modal-bg" onClick={()=>setPenaltyModal(null)}>
          <div className="modal pop-in" onClick={e=>e.stopPropagation()}>
            <h3 style={{fontWeight:700,fontSize:17,marginBottom:4}}>Manage Marks</h3>
            <p style={{fontSize:13,color:"#64748b",marginBottom:16}}>{penaltyModal.name} · {unit?.code}</p>
            <Fld label="PENALTY MARKS (0–10)"><input className="input" type="number" min={0} max={10} value={penaltyForm.pts} onChange={e=>setPenaltyForm(f=>({...f,pts:Math.min(10,Math.max(0,Number(e.target.value)))}))}/></Fld>
            <Fld label="REASON"><textarea className="input" placeholder="Reason…" value={penaltyForm.note} onChange={e=>setPenaltyForm(f=>({...f,note:e.target.value}))}/></Fld>
            <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,cursor:"pointer",marginBottom:16}}><input type="checkbox" checked={penaltyForm.forgiven} onChange={e=>setPenaltyForm(f=>({...f,forgiven:e.target.checked}))} style={{width:16,height:16}}/>Forgive / waive this penalty</label>
            <div style={{display:"flex",gap:10}}><button className="btn btn-blue" style={{flex:1}} onClick={applyPenalty}>Apply</button><button className="btn btn-outline" onClick={()=>setPenaltyModal(null)}>Cancel</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Admin Today ──────────────────────────────────────────────────────────────
function AdminToday({units,classes,timetable,records,lecRecs,students,lecturers}){
  const dow=todayDow();
  const todaySlots=timetable.filter(t=>t.day===dow&&!t.cancelled);
  return(
    <div className="slide-in">
      <h2 style={{fontWeight:700,fontSize:20,marginBottom:18}}>Today's Overview <span style={{fontSize:12,color:"#34d399",fontWeight:600}}>● Firebase Live</span></h2>
      {todaySlots.length===0?<div className="card" style={{textAlign:"center",padding:40,color:"#94a3b8"}}>No classes today.</div>
      :todaySlots.map(tt=>{
        const unit=units.find(u=>u.id===tt.unitId);
        const cls=classes.find(c=>c.id===tt.classId);
        const lec=lecturers[unit?.lecturerId||""];
        const st=slotStatus(tt);
        const lecCheckedIn=lecRecs.find(r=>r.lecturerId===unit?.lecturerId&&r.ttId===tt.id&&r.date===todayStr());
        const enrolled=(cls?.students||[]).map(id=>students[id]).filter(Boolean).filter(s=>s.status!=="deferred");
        const studentRecs=records.filter(r=>r.ttId===tt.id&&r.date===todayStr());
        const present=studentRecs.filter(r=>r.status==="present"||r.status==="late").length;
        const pct=enrolled.length>0?Math.round(present/enrolled.length*100):0;
        return(
          <div key={tt.id} className="card" style={{marginBottom:14,border:st.live?"2px solid #DC2626":"2px solid transparent"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12,marginBottom:12}}>
              <div>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
                  {st.live&&<span className="live-dot"/>}
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:unitColor(unit?.id||"")}}>{unit?.code}</span>
                  {st.live&&<span className="badge" style={{background:"#FEE2E2",color:"#DC2626"}}>🔴 LIVE</span>}
                  {st.status==="upcoming"&&<span className="badge" style={{background:"#EEF2FF",color:"#2563EB"}}>in {st.minsUntil}m</span>}
                  {st.status==="ended"&&<span className="badge" style={{background:"#F8FAFF",color:"#94a3b8"}}>Ended</span>}
                </div>
                <div style={{fontWeight:700,fontSize:16}}>{unit?.name}</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{tt.startTime}–{addHrs(tt.startTime,UNIT_DURATION)} · {tt.room} · {cls?.code}</div>
              </div>
              <div style={{background:lecCheckedIn?"#D1FAE5":"#FEE2E2",borderRadius:12,padding:"10px 16px",textAlign:"center",minWidth:130}}>
                <div style={{fontSize:11,fontWeight:600,color:lecCheckedIn?"#065F46":"#DC2626",marginBottom:2}}>LECTURER</div>
                <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
                  <Av i={lec?.photo||"LEC"} size={24} g={lecCheckedIn?"135deg,#059669,#34d399":"135deg,#DC2626,#f87171"}/>
                  <span style={{fontWeight:600,fontSize:13,color:lecCheckedIn?"#065F46":"#DC2626"}}>{lec?.name?.split(" ").slice(-1)[0]}</span>
                </div>
                <div style={{fontSize:11,color:lecCheckedIn?"#065F46":"#DC2626",marginTop:2}}>{lecCheckedIn?"✓ In":"✗ Not in"}</div>
              </div>
            </div>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6}}>
                <span style={{fontWeight:600}}>Student Attendance</span>
                <span style={{color:"#64748b"}}>{present}/{enrolled.length}</span>
              </div>
              <div style={{height:7,background:"#EEF2FF",borderRadius:99,overflow:"hidden",marginBottom:8}}>
                <div style={{width:`${pct}%`,height:"100%",background:pct>=75?"#059669":pct>=50?"#F59E0B":"#DC2626",borderRadius:99,transition:"width .4s"}}/>
              </div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {enrolled.slice(0,14).map(s=>{
                  const r=studentRecs.find(x=>x.studentId===s.id);
                  return<div key={s.id} title={`${s.name}: ${r?r.status:"absent"}`} style={{width:28,height:28,borderRadius:"50%",background:r?(r.status==="late"?"#FEF3C7":"#D1FAE5"):"#FEE2E2",border:`2px solid ${r?(r.status==="late"?"#D97706":"#059669"):"#DC2626"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:r?(r.status==="late"?"#92400E":"#065F46"):"#DC2626"}}>{s.photo}</div>;
                })}
                {enrolled.length>14&&<div style={{width:28,height:28,borderRadius:"50%",background:"#EEF2FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#6B7FBD",fontWeight:700}}>+{enrolled.length-14}</div>}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── Admin Classes ────────────────────────────────────────────────────────────
function AdminClasses({session,classes,students,units,pushNotif}){
  const[modal,setModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[form,setForm]=useState({});
  const[importing,setImporting]=useState(false);

  const importFromMoodle=async()=>{
    setImporting(true);
    await delay(1500);
    setImporting(false);
    pushNotif(["ADMIN"],"✅ Moodle Sync","Classes and students synced from elearning.tum.ac.ke","info");
    writeAudit(session.id,"Moodle import","Classes synced");

  const save=async()=>{
    if(!form.code||!form.name) return;
    if(editing){ await window.FB.set("classes",editing.id,{...editing,...form},true); }
    else { const id=uid(); await window.FB.set("classes",id,{...form,id,students:[]}); }

            <div style={{display:"flex",gap:10}}>
              <button className="btn btn-blue" style={{flex:1}} onClick={save}>Save</button>
              <button className="btn btn-outline" onClick={()=>setModal(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Admin Lecturers ──────────────────────────────────────────────────────────
function AdminLecturers({units,timetable,lecRecs,lecturers}){
  const lecs=Object.values(lecturers);
  return(
    <div className="slide-in">
      <h2 style={{fontWeight:700,fontSize:18,marginBottom:16}}>Lecturers</h2>
      {lecs.map(l=>{
        const myUnits=units.filter(u=>u.lecturerId===l.id&&u.active);
        const mySlots=timetable.filter(t=>myUnits.some(u=>u.id===t.unitId)&&!t.cancelled);
        const myRecs=lecRecs.filter(r=>r.lecturerId===l.id);
        const pct=mySlots.length>0?Math.round(myRecs.length/mySlots.length*100):0;
        return(
          <div key={l.id} className="card" style={{marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <Av i={l.photo} size={46} g="135deg,#7C3AED,#a78bfa"/>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:16}}>{l.name}</div>
                <div style={{fontSize:12,color:"#64748b"}}>{l.email} · {l.dept}</div>
                <div style={{fontSize:12,color:"#94a3b8",marginTop:1}}>{myUnits.length} unit{myUnits.length!==1?"s":""} · {myRecs.length}/{mySlots.length} sessions</div>
              </div>
              <div style={{textAlign:"center",minWidth:70}}>
                <div style={{fontSize:26,fontWeight:800,color:pct>=80?"#059669":"#D97706"}}>{pct}%</div>
                <div style={{fontSize:11,color:"#94a3b8"}}>Delivery</div>
                <Barpct pct={pct}/>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── Semester Archive ─────────────────────────────────────────────────────────
function SemesterArchive({session,semLocked,setSemLocked,records,units,classes,students,pushNotif}){
  const[confirm,setConfirm]=useState(false);
  const lock=async()=>{
    await fbLockSem(true);
    setSemLocked(true);
    pushNotif("all","🔒 Semester Locked","All records are now final. No further edits permitted.","info");
    writeAudit(session.id,"Semester lock","Sem 2 2025 locked");
    setConfirm(false);
  };
  const exportAll=()=>{
    const rows=[["Student","Adm No","Class","Unit","Attended","Late","Absent","Rate%","Bonus","Penalty","Net","Standing"]];
    classes.forEach(cls=>{
      (cls.students||[]).forEach(sId=>{
        const s=students[sId]; if(!s) return;
        units.filter(u=>u.classIds?.includes(cls.id)&&u.active).forEach(u=>{
          const recs=records.filter(r=>r.studentId===sId&&r.unitId===u.id);
          const attended=recs.filter(r=>r.status==="present"||r.status==="late").length;
          const lateCount=recs.filter(r=>r.status==="late").length;
          const total=20;const pct=Math.round(attended/total*100);
          const bonus=bonusMark(pct);const penalty=recs.reduce((a,r)=>a+((r.penalty||0)*(r.penaltyForgiven?0:1)),0);
          rows.push([s.name,s.adm,cls.code,u.code,attended,lateCount,total-attended,pct,bonus,penalty,Math.max(0,bonus-penalty),standing(pct).l]);
        });
      });
    });
    if(semLocked) rows.push(["---","SEMESTER LOCKED — FINAL"]);
    const csv=rows.map(r=>r.join(",")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download=`TUM_Attendance_Sem2_2025${semLocked?"_FINAL":""}.csv`;a.click();
    writeAudit(session.id,"Export all CSV",semLocked?"FINAL":"Draft");
  };
  return(
    <div className="slide-in">
      <h2 style={{fontWeight:700,fontSize:18,marginBottom:6}}>Semester Archive</h2>
      <p style={{fontSize:13,color:"#64748b",marginBottom:18}}>Lock the semester to freeze all records across every device.</p>
      <div className="card" style={{marginBottom:16,borderTop:`4px solid ${semLocked?"#DC2626":"#7C3AED"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>Semester 2 · 2024/2025</div>
            <div style={{fontSize:13,color:"#64748b"}}>Status: <strong style={{color:semLocked?"#DC2626":"#059669"}}>{semLocked?"🔒 LOCKED":"🟢 Open"}</strong></div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button className="btn btn-green" onClick={exportAll}>📥 Export{semLocked?" FINAL":""} CSV</button>
            {!semLocked&&<button className="btn btn-red" onClick={()=>setConfirm(true)}>🔒 Lock Semester</button>}
          </div>
        </div>
      </div>
      {confirm&&(
        <div className="modal-bg">
          <div className="modal pop-in" style={{textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:10}}>🔒</div>
            <h3 style={{fontWeight:700,fontSize:18,marginBottom:8}}>Lock Semester?</h3>
            <p style={{color:"#64748b",fontSize:13,lineHeight:1.6,marginBottom:20}}>This will <strong>freeze all records on Firebase</strong> instantly for every device. No lecturer will be able to edit marks or penalties after this. Cannot be undone.</p>
            <div style={{display:"flex",gap:12}}><button className="btn btn-red" style={{flex:1}} onClick={lock}>Yes, Lock</button><button className="btn btn-outline" style={{flex:1}} onClick={()=>setConfirm(false)}>Cancel</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Audit Log ────────────────────────────────────────────────────────────────
function AuditLogView(){
  const[log,setLog]=useState([]);
  useEffect(()=>{
    const unsub=window.FB.listen("audit",docs=>setLog(docs.sort((a,b)=>b.at>a.at?1:-1)));
    return()=>unsub();
  },[]);
  const rc={S:"#2563EB",L:"#059669",ADMIN:"#7C3AED",SYSTEM:"#94a3b8"};
  return(
    <div className="slide-in">
      <h2 style={{fontWeight:700,fontSize:18,marginBottom:16}}>Audit Log <span style={{fontSize:11,color:"#34d399",fontWeight:600}}>● Live</span></h2>
      {log.length===0?<div className="card" style={{textAlign:"center",padding:36,color:"#94a3b8"}}>No entries yet.</div>
      :<div className="card" style={{overflowX:"auto"}}>
        <table>
          <thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Detail</th></tr></thead>
          <tbody>
            {log.map(e=>{
              const prefix=e.actor?.slice(0,1)||"?";
              return(
                <tr key={e._docId}>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtFull(e.at)}</td>
                  <td><span className="badge" style={{background:`${rc[prefix]||"#94a3b8"}15`,color:rc[prefix]||"#94a3b8"}}>{e.actor}</span></td>
                  <td style={{fontWeight:600,fontSize:13}}>{e.action}</td>
                  <td style={{fontSize:12,color:"#64748b"}}>{e.detail}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>}
    </div>
  );
}

// ─── Broadcast ────────────────────────────────────────────────────────────────
function Broadcast({session,pushNotif,notifs}){
  const[form,setForm]=useState({title:"",body:"",to:"all"});
  const send=()=>{
    if(!form.title||!form.body) return;
    pushNotif(form.to,form.title,form.body,"info");
    writeAudit(session.id,"Broadcast",`To:${form.to} — "${form.title}"`);
    setForm({title:"",body:"",to:"all"});
  };
  const myNotifs=notifs.filter(n=>n.toIds==="all"||(Array.isArray(n.toIds)&&n.toIds.includes("ADMIN")));
  return(
    <div className="slide-in">
      <h2 style={{fontWeight:700,fontSize:18,marginBottom:16}}>Broadcast</h2>
      <div className="card" style={{maxWidth:520,marginBottom:20}}>
        <Fld label="SEND TO"><select className="input" value={form.to} onChange={e=>setForm(f=>({...f,to:e.target.value}))}><option value="all">Everyone</option><option value="students">All Students</option><option value="lecturers">All Lecturers</option></select></Fld>
        <Fld label="TITLE"><input className="input" placeholder="Title" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}/></Fld>
        <Fld label="MESSAGE"><textarea className="input" placeholder="Message…" value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))}/></Fld>
        <button className="btn btn-blue" style={{width:"100%"}} onClick={send}>📢 Send to All Devices</button>
      </div>
      <h3 style={{fontWeight:600,fontSize:14,marginBottom:10}}>Recent</h3>
      <NotifList notifs={myNotifs.slice(0,8)}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
//  MICRO-COMPONENTS
// ═══════════════════════════════════════════════════════════════════════════════
function QRCard({unit,cls,qrReady,payload}){
  const ref=useRef(null);const made=useRef(false);
  useEffect(()=>{
    if(!qrReady||!ref.current||made.current) return; made.current=true; ref.current.innerHTML="";
    new window.QRCode(ref.current,{text:payload,width:160,height:160,colorDark:"#0a0f2e",colorLight:"#fff",correctLevel:window.QRCode?.CorrectLevel?.H});
  },[qrReady,payload]);
  const col=unitColor(unit.id);
  return(
    <div className="card" style={{width:230,textAlign:"center",border:`2px solid ${col}22`}}>
      <div style={{background:`linear-gradient(135deg,${col},${col}99)`,borderRadius:10,padding:"10px 14px",marginBottom:12,color:"#fff"}}>
        <div style={{fontWeight:800,fontSize:14}}>{unit.code}</div>
        <div style={{opacity:.85,fontSize:12,marginTop:1}}>{cls?.code}</div>
      </div>
      <div ref={ref} style={{display:"flex",justifyContent:"center",marginBottom:10}}/>
      <div style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>Hand to class rep</div>
      <button className="btn btn-ghost btn-sm" style={{width:"100%"}} onClick={()=>{const c=ref.current?.querySelector("canvas");if(c){const a=document.createElement("a");a.href=c.toDataURL();a.download=`${unit.code}_${cls?.code}_QR.png`;a.click();}}}>↓ Download PNG</button>
    </div>
  );
}

function NotifList({notifs}){
  if(!notifs.length) return<div className="card" style={{textAlign:"center",padding:40,color:"#94a3b8"}}><div style={{fontSize:32,marginBottom:8}}>🔔</div>No notifications.</div>;
  const tc={reschedule:"#D97706",reminder:"#2563EB",penalty:"#7C3AED",warning:"#DC2626",info:"#059669"};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {notifs.map(n=>(
        <div key={n._docId||n.id} className="card-sm" style={{borderLeft:`4px solid ${tc[n.type]||"#94a3b8"}`}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{n.title}</div>
          <div style={{fontSize:12,color:"#64748b",lineHeight:1.5}}>{n.body}</div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:5}}>{elapsed(n.time)}</div>
        </div>
      ))}
    </div>
  );
}

function Av({i,size=36,g="135deg,#2563EB,#0ea5e9"}){
  return<div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(${g})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:Math.max(9,size*.28),fontWeight:700,color:"#fff",flexShrink:0}}>{i}</div>;
}
function Barpct({pct}){
  const c=pct>=75?"#059669":pct>=60?"#F59E0B":"#DC2626";
  return<div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:50,height:5,background:"#EEF2FF",borderRadius:99,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:c,borderRadius:99}}/></div><span style={{fontSize:12,fontWeight:700,color:c}}>{pct}%</span></div>;
}
function Fld({label,children}){
  return<div style={{marginBottom:12}}><label style={{fontSize:11,fontWeight:600,color:"#374151",display:"block",marginBottom:5,letterSpacing:".06em"}}>{label}</label>{children}</div>;
}
function Spinner(){
  return<span className="spin" style={{width:13,height:13,border:"2px solid rgba(255,255,255,.3)",borderTop:"2px solid #fff",borderRadius:"50%",display:"inline-block",flexShrink:0}}/>;
}

// ─── Mount ────────────────────────────────────────────────────────────────────
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
requestAnimationFrame(()=>{
  setTimeout(()=>{
    const ld=document.getElementById('loading');
    if(ld){ld.style.opacity='0';setTimeout(()=>ld.remove(),400);}
  },1200);
});
</script>
